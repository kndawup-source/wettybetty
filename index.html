<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>WETTY BETTY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#050d16;--panel:#0b1620;--line:rgba(255,255,255,.08);
  --text:#edf4fa;--muted:#7f93a2;--soft:#bfd0da;
  --accent:#dff56a;--blue:#82c7ff;--red:#ff6f6f;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif}
body{padding-bottom:40px}
button,input{font-family:inherit}
button{border:0;cursor:pointer}
button:disabled{opacity:.45;cursor:not-allowed}
.hidden{display:none!important}

/* ── Layout ── */
.app,.auth-screen{width:100%;max-width:480px;margin:0 auto;min-height:100dvh}
.app{
  padding-bottom:40px;
  background:
    radial-gradient(circle at 50% -10%,rgba(223,245,106,.08),transparent 32%),
    linear-gradient(180deg,#07121c 0%,#050d16 52%,#050d16 100%);
}
.auth-screen{
  padding:38px 20px 24px;
  background:
    radial-gradient(circle at 50% -8%,rgba(223,245,106,.12),transparent 34%),
    linear-gradient(180deg,#07121c,#050d16);
}

/* ── Auth ── */
.auth-logo{font-family:'Syne',sans-serif;font-size:34px;font-weight:900;letter-spacing:-2px;line-height:1}
.auth-logo em,.logo em{color:var(--accent);font-style:normal}
.auth-card{margin-top:34px;padding:20px;border-radius:28px;background:linear-gradient(145deg,#102131,#09131d);border:1px solid rgba(255,255,255,.08)}
.auth-title{font-size:24px;font-weight:900;line-height:1.25}
.auth-desc{margin-top:10px;color:var(--muted);font-size:13px;line-height:1.6}
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:20px}
.auth-tab{height:44px;border-radius:15px;background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--muted);font-size:13px;font-weight:900}
.auth-tab.active{background:var(--accent);color:#07100c}
.auth-form{display:none;margin-top:16px}
.auth-form.active{display:block}
.field{margin-top:10px}
.field label{display:block;margin-bottom:7px;color:var(--muted);font-size:10px;font-weight:900}
.field input{width:100%;height:48px;padding:0 14px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--text);outline:none;font-size:15px;font-weight:800}
.field input::placeholder{color:rgba(127,147,162,.55)}
.auth-main-btn{width:100%;height:50px;margin-top:16px;border-radius:17px;background:var(--accent);color:#07100c;font-weight:900;font-size:14px}
.auth-help{margin-top:14px;color:var(--muted);font-size:11px;line-height:1.5;text-align:center}

/* ── Header ── */
.header{
  position:sticky;top:0;z-index:50;height:58px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  background:rgba(5,13,22,.94);backdrop-filter:blur(14px);
}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:900;letter-spacing:-1px}
.header-right{display:flex;align-items:center;gap:8px}
.icon-btn,.profile-mini{
  height:38px;border-radius:14px;
  background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--text);
}
.icon-btn{width:38px;font-size:15px}
.profile-mini{padding:0 12px;display:flex;align-items:center;gap:7px;color:var(--soft)}
.pm-name{max-width:74px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:11px;font-weight:900}

/* ── Weather ── */
.weather-board{
  position:relative;margin:12px 16px 14px;padding:20px;
  border-radius:24px;
  background:linear-gradient(145deg,#102131,#09131d);
  border:1px solid rgba(255,255,255,.06);
  overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.28);
}
.refresh-btn{
  position:absolute;top:14px;right:14px;width:30px;height:30px;
  border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--muted);
}
.weather-top{display:flex;justify-content:space-between;gap:12px}
.weather-kicker{display:inline-flex;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--soft);font-size:9px;font-weight:900}
.temp{margin-top:10px;font-family:'Syne',sans-serif;font-size:64px;line-height:.88;letter-spacing:-4px;font-weight:900}
.weather-desc{margin-top:10px;max-width:220px;color:var(--muted);font-size:12px;line-height:1.5}
.weather-icon{width:74px;height:74px;flex:0 0 74px;border-radius:22px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.05);border:1px solid var(--line);font-size:32px}
.weather-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:16px}
.weather-cell{padding:10px 8px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid var(--line)}
.weather-cell span{display:block;color:var(--muted);font-size:9px;font-weight:900}
.weather-cell strong{display:block;margin-top:5px;font-size:13px}

/* ── Board ── */
.board{margin:0 16px 14px;padding:14px;border-radius:24px;background:rgba(255,255,255,.03);border:1px solid var(--line)}
.board-head,.section-title{display:flex;justify-content:space-between;align-items:center}
.board-head{margin-bottom:8px}
.board-head h2{font-size:14px;font-weight:900}
.board-head span{position:relative;padding-left:10px;color:var(--accent);font-size:10px;font-weight:900}
.board-head span::before{
  content:"";position:absolute;left:0;top:50%;width:5px;height:5px;
  border-radius:50%;background:var(--accent);transform:translateY(-50%);
  animation:livePulse 1.2s infinite;
}
@keyframes livePulse{
  0%{opacity:.3;transform:translateY(-50%) scale(.8)}
  50%{opacity:1;transform:translateY(-50%) scale(1)}
  100%{opacity:.3;transform:translateY(-50%) scale(.8)}
}
.board-item{display:flex;justify-content:space-between;gap:10px;padding:11px 0;border-top:1px solid var(--line)}
.board-item:first-child{border-top:0}
.bi-title{font-size:13px;font-weight:900}
.bi-sub{margin-top:3px;color:var(--muted);font-size:11px}
.bi-right{color:var(--accent);font-size:13px;font-weight:900;white-space:nowrap}

/* ── Markets ── */
.section-title{margin:18px 16px 10px}
.section-title h2{font-size:15px;font-weight:900}
.section-title span{color:var(--muted);font-size:11px;font-weight:900}
.market-card{
  margin:0 16px 12px;padding:16px;border-radius:24px;
  background:linear-gradient(170deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
  border:1px solid var(--line);
  animation:cardUp .35s ease;
}
@keyframes cardUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.market-card.closed{opacity:.72}
.market-region{display:inline-flex;padding:6px 10px;border-radius:999px;background:rgba(130,199,255,.08);border:1px solid rgba(130,199,255,.18);color:var(--blue);font-size:10px;font-weight:900}
.market-title{margin-top:12px;font-size:20px;line-height:1.3;font-weight:900}
.market-meta{margin-top:8px;display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:11px}
.time-box{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:12px}
.time-cell{padding:9px 7px;border-radius:13px;background:rgba(255,255,255,.04);border:1px solid var(--line)}
.time-cell span{display:block;color:var(--muted);font-size:9px;font-weight:900}
.time-cell strong{display:block;margin-top:4px;color:var(--soft);font-size:11px;font-weight:900}
.market-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.market-cell{padding:13px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid var(--line)}
.market-cell span{display:block;color:var(--muted);font-size:10px;font-weight:900}
.market-cell strong{display:block;margin-top:6px;font-family:'Syne',sans-serif;font-size:30px}
.market-cell small{display:block;margin-top:6px;color:var(--muted);font-size:10px;font-weight:900}
.vote-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.vote-btn{height:46px;border-radius:15px;font-size:14px;font-weight:900}
.vote-btn.rain{background:rgba(130,199,255,.12);border:1px solid rgba(130,199,255,.22);color:var(--blue)}
.vote-btn.clear{background:rgba(223,245,106,.08);border:1px solid rgba(223,245,106,.22);color:var(--accent)}
.vote-btn:active,.main-btn:active,.sub-btn:active,.icon-btn:active,.profile-mini:active,.auth-main-btn:active{transform:scale(.97)}
.closed-badge{display:inline-flex;margin-top:10px;padding:6px 9px;border-radius:999px;background:rgba(255,255,255,.055);border:1px solid var(--line);color:var(--muted);font-size:10px;font-weight:900}
.closed-badge.done{color:var(--accent);background:rgba(223,245,106,.08);border-color:rgba(223,245,106,.18)}

/* ── Overlay / Sheet ── */
.overlay{
  position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.82);backdrop-filter:blur(10px);
  z-index:20000;padding:20px 16px calc(20px + env(safe-area-inset-bottom));
}
.overlay.show{display:flex}
.sheet{
  width:100%;max-width:480px;max-height:78dvh;overflow-y:auto;
  padding:16px 24px 28px;border-radius:32px;
  background:var(--panel);border:1px solid var(--line);
}
.sheet-grip{width:44px;height:5px;border-radius:999px;background:rgba(255,255,255,.18);margin:0 auto 18px}
.sheet-head{display:flex;justify-content:space-between;align-items:flex-start}
.sheet-head h2{font-family:'Syne',sans-serif;font-size:22px}
.sheet-head p{margin-top:4px;color:var(--muted);font-size:12px}
.close-btn{width:34px;height:34px;border-radius:12px;background:rgba(255,255,255,.06);color:var(--text);font-size:18px}
.profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:18px}
.profile-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.main-btn,.sub-btn,.logout-btn{height:46px;border-radius:16px;font-size:13px;font-weight:900}
.main-btn{background:var(--accent);color:#07100c}
.sub-btn{background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--text)}
.stat-box{padding:12px 10px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid var(--line)}
.stat-box span{display:block;color:var(--muted);font-size:9px;font-weight:900}
.stat-box strong{display:block;margin-top:4px;font-size:16px}
.logout-btn{margin-top:12px;margin-bottom:8px;width:100%;background:rgba(255,111,111,.12);border:1px solid rgba(255,111,111,.22);color:var(--red)}

/* ── Confirm Modal ── */
.confirm-box{padding:24px;text-align:center}
.confirm-box h3{font-family:'Syne',sans-serif;font-size:18px;margin-bottom:10px}
.confirm-box p{color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:20px}
.confirm-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.confirm-cancel{height:46px;border-radius:16px;font-size:13px;font-weight:900;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--text)}
.confirm-ok{height:46px;border-radius:16px;font-size:13px;font-weight:900;background:var(--accent);color:#07100c}

/* ── Toast ── */
.toast{
  position:fixed;left:50%;bottom:calc(32px + env(safe-area-inset-bottom));
  transform:translateX(-50%) translateY(8px);
  padding:12px 18px;border-radius:999px;
  background:var(--text);color:#06100c;
  font-size:13px;font-weight:900;
  opacity:0;pointer-events:none;transition:.2s;z-index:30000;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

<body>

<!-- ─── AUTH ─── -->
<div class="auth-screen" id="authScreen">
  <div class="auth-logo">WETTY <em>BETTY</em></div>
  <div class="auth-card">
    <div class="auth-title">날씨를 예측하고<br>포인트를 쌓아보세요.</div>
    <div class="auth-desc">전화번호 뒷자리와 PIN으로 간편하게 로그인합니다.</div>
    <div class="auth-tabs">
      <button class="auth-tab active" data-auth-tab="login">로그인</button>
      <button class="auth-tab" data-auth-tab="signup">가입</button>
    </div>
    <div class="auth-form active" id="loginForm">
      <div class="field"><label>전화번호 뒷자리 4자리</label><input id="loginPhone" inputmode="numeric" maxlength="4" placeholder="예: 1234"></div>
      <div class="field"><label>PIN 4~6자리</label><input id="loginPin" inputmode="numeric" maxlength="6" type="password" placeholder="PIN 입력"></div>
      <button class="auth-main-btn" data-action="login">로그인</button>
    </div>
    <div class="auth-form" id="signupForm">
      <div class="field"><label>닉네임</label><input id="signupNick" maxlength="12" placeholder="예: WETTY"></div>
      <div class="field"><label>전화번호 뒷자리 4자리</label><input id="signupPhone" inputmode="numeric" maxlength="4" placeholder="예: 1234"></div>
      <div class="field"><label>PIN 4~6자리</label><input id="signupPin" inputmode="numeric" maxlength="6" type="password" placeholder="PIN 설정"></div>
      <button class="auth-main-btn" data-action="signup">가입하고 시작</button>
    </div>
    <div class="auth-help">PIN은 서버에서 해시 처리됩니다. 프론트에는 저장하지 않습니다.</div>
  </div>
</div>

<!-- ─── MAIN APP ─── -->
<div class="app hidden" id="mainApp">
  <header class="header">
    <div class="logo">WETTY <em>BETTY</em></div>
    <div class="header-right">
      <button class="icon-btn" data-action="notice">🔔</button>
      <button class="profile-mini" data-action="profile">
        <span>👤</span>
        <span class="pm-name" id="nickname">GUEST</span>
      </button>
    </div>
  </header>

  <section class="weather-board">
    <button class="refresh-btn" data-action="refresh">↻</button>
    <div class="weather-top">
      <div>
        <div class="weather-kicker" id="currentLocationText">📍 위치 확인중...</div>
        <div class="temp" id="currentTemp">--°</div>
        <div class="weather-desc" id="currentDesc">현재 위치의 날씨를 확인하고 있습니다.</div>
      </div>
      <div class="weather-icon" id="weatherIcon">🌤️</div>
    </div>
    <div class="weather-grid">
      <div class="weather-cell"><span>체감</span><strong id="feelsLike">--°</strong></div>
      <div class="weather-cell"><span>강수</span><strong id="rainChance">--%</strong></div>
      <div class="weather-cell"><span>바람</span><strong id="windSpeed">--</strong></div>
      <div class="weather-cell"><span>변화</span><strong id="tempDiff">--°</strong></div>
    </div>
  </section>

  <section class="board">
    <div class="board-head"><h2>지금 몰리는 지역</h2><span>LIVE</span></div>
    <div id="hotList"></div>
  </section>

  <section class="section-title"><h2>TOP PICKS</h2><span>실시간 참여 반영</span></section>
  <div id="marketList"></div>

  <section class="section-title"><h2>마감된 예측</h2><span>결과 대기 / 정산 완료</span></section>
  <div id="closedList"></div>
</div>

<!-- ─── PROFILE MODAL ─── -->
<div class="overlay" id="profileModal">
  <div class="sheet">
    <div class="sheet-grip"></div>
    <div class="sheet-head">
      <div><h2 id="profileName">PROFILE</h2><p id="profileCode">초대코드 --</p></div>
      <button class="close-btn" data-action="close-profile">×</button>
    </div>
    <div class="profile-stats">
      <div class="stat-box"><span>포인트</span><strong id="profilePoint">0</strong></div>
      <div class="stat-box"><span>적중률</span><strong id="profileRate">0%</strong></div>
      <div class="stat-box"><span>연승</span><strong id="profileStreak">0</strong></div>
    </div>
    <div class="profile-actions">
      <button class="main-btn" data-action="checkin">출석 포인트 받기</button>
      <button class="sub-btn" data-action="copy-invite">친구 초대 🎁</button>
    </div>
    <button class="logout-btn" data-action="logout">로그아웃</button>
  </div>
</div>

<!-- ─── CONFIRM MODAL ─── -->
<div class="overlay" id="confirmModal">
  <div class="sheet">
    <div class="confirm-box">
      <h3 id="confirmTitle"></h3>
      <p id="confirmBody"></p>
      <div class="confirm-actions">
        <button class="confirm-cancel" data-action="confirm-cancel">취소</button>
        <button class="confirm-ok" data-action="confirm-ok">참여</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

const $ = id => document.getElementById(id);
const pad2 = n => String(n).padStart(2, "0");
const timeLabel = d => `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
const addMinutes = (d, m) => new Date(d.getTime() + m * 60000);
const onlyDigits = v => String(v || "").replace(/\D/g, "");

let toastTimer = null;
function toast(msg) {
  const el = $("toast");
  if (!el) return;
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 1800);
}

function setButtonLoading(btn, loading, text) {
  if (!btn) return;
  if (loading) { btn.dataset.originText = btn.textContent; btn.textContent = text || "처리중..."; btn.disabled = true; }
  else { btn.textContent = btn.dataset.originText || btn.textContent; btn.disabled = false; }
}

function isMarketClosed(item) { return Date.now() >= Number(item.closeTimeMs || 0); }

/* ── 세션 토큰 (id + HMAC-like nonce 조합) ── */
function saveSession(user) {
  // 민감 정보 전체 대신 id + 갱신 타임스탬프만 저장
  sessionStorage.setItem("wetty_session", JSON.stringify({ id: user.id, ts: Date.now() }));
  // 닉네임 등 표시용 비민감 정보는 별도 키에 분리
  sessionStorage.setItem("wetty_display", JSON.stringify({
    nickname: user.nickname,
    points: user.points,
    vote_count: user.vote_count,
    hit_count: user.hit_count,
    streak: user.streak,
    referral_code: user.referral_code
  }));
}
function clearSession() {
  sessionStorage.removeItem("wetty_session");
  sessionStorage.removeItem("wetty_display");
}
async function tryRestoreLogin() {
  const raw = sessionStorage.getItem("wetty_session");
  if (!raw) return false;
  try {
    const { id, ts } = JSON.parse(raw);
    if (!id) { clearSession(); return false; }

    // 세션 최대 유효기간: 8시간
    if (Date.now() - ts > 8 * 60 * 60 * 1000) { clearSession(); return false; }

    // 서버에서 최신 유저 정보 재검증
    const res = await fetch("/api/me", {
      headers: { "X-User-Id": id }
    });
    if (!res.ok) { clearSession(); return false; }
    const json = await res.json();
    if (!json.ok || !json.user) { clearSession(); return false; }

    applyUser(json.user);
    return true;
  } catch (e) {
    // /api/me 미구현 환경(로컬)에서는 display 데이터로 폴백
    try {
      const session = JSON.parse(sessionStorage.getItem("wetty_session") || "{}");
      const display = JSON.parse(sessionStorage.getItem("wetty_display") || "{}");
      if (session.id && display.nickname) {
        applyUser({ id: session.id, ...display });
        return true;
      }
    } catch {}
    clearSession();
    return false;
  }
}

/* ── 예측 시간 윈도우 ── */
function getNextBettingWindow(now = new Date()) {
  const base = new Date(now);
  base.setMinutes(0, 0, 0);
  let h = base.getHours();
  const nextEven = h % 2 === 0 ? h + 2 : h + 1;
  const start = new Date(base);
  start.setHours(nextEven, 0, 0, 0);
  if (start <= now) start.setHours(start.getHours() + 2);
  const end = addMinutes(start, 120);
  const close = addMinutes(start, -30);
  const result = addMinutes(end, 10);
  return {
    close, start, end, result,
    closeLabel: timeLabel(close),
    targetLabel: `${timeLabel(start)}~${timeLabel(end)}`,
    resultLabel: timeLabel(result)
  };
}

/* ── 날씨 API ── */
async function fetchWeather(lat, lon) {
  const key = `${Number(lat).toFixed(2)},${Number(lon).toFixed(2)}`;
  const cached = state.weatherCache.get(key);
  if (cached && Date.now() - cached.ts < 10 * 60 * 1000) return cached.data;

  // sessionStorage 보조 캐시
  try {
    const sc = sessionStorage.getItem(`wx_${key}`);
    if (sc) {
      const { data, ts } = JSON.parse(sc);
      if (Date.now() - ts < 10 * 60 * 1000) {
        state.weatherCache.set(key, { data, ts });
        return data;
      }
    }
  } catch {}

  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
    `&current=temperature_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m` +
    `&hourly=precipitation_probability,temperature_2m&past_days=1&forecast_days=1&timezone=Asia%2FSeoul`;

  const res = await fetch(url);
  if (!res.ok) throw new Error("weather API error");

  const json = await res.json();
  const c = json.current || {};
  const h = json.hourly || {};
  const probs = h.precipitation_probability || [];
  const temps = h.temperature_2m || [];
  const temp = Number(c.temperature_2m || 0);
  const yesterdayTemp = Number(temps[0] || temp);

  const data = {
    temp,
    feelsLike: Number(c.apparent_temperature || temp),
    precipitation: Number(c.precipitation || 0),
    code: Number(c.weather_code || 0),
    wind: Number(c.wind_speed_10m || 0),
    rainProb: Number(probs[0] || 0),
    tempDiff: Math.round(temp - yesterdayTemp)
  };

  state.weatherCache.set(key, { data, ts: Date.now() });
  try { sessionStorage.setItem(`wx_${key}`, JSON.stringify({ data, ts: Date.now() })); } catch {}
  return data;
}

function getWeatherEmoji(code, rainProb, precipitation) {
  if (precipitation > 0) return "🌧️";
  if (rainProb >= 60) return "☔";
  if (rainProb >= 35) return "🌦️";
  if ([0, 1].includes(code)) return "☀️";
  if ([2, 3, 45, 48].includes(code)) return "☁️";
  return "🌤️";
}
function weatherDesc(rainProb, precipitation) {
  if (precipitation > 0) return "현재 비가 감지되고 있습니다.";
  if (rainProb >= 60) return "비 가능성이 높은 흐름입니다.";
  if (rainProb >= 35) return "비가 올지 애매한 흐름입니다.";
  return "현재는 비교적 안정적인 날씨입니다.";
}
function applyWeatherToUI(w, label) {
  $("currentTemp").textContent = `${Math.round(w.temp)}°`;
  $("feelsLike").textContent = `${Math.round(w.feelsLike)}°`;
  $("rainChance").textContent = `${w.rainProb}%`;
  $("windSpeed").textContent = `${w.wind.toFixed(1)}m/s`;
  $("tempDiff").textContent = `${w.tempDiff >= 0 ? "+" : ""}${w.tempDiff}°`;
  $("weatherIcon").textContent = getWeatherEmoji(w.code, w.rainProb, w.precipitation);
  $("currentDesc").textContent = weatherDesc(w.rainProb, w.precipitation);
  $("currentLocationText").textContent = label;
}

async function loadDefaultWeather() {
  try {
    const w = await fetchWeather(37.4979, 127.0276);
    applyWeatherToUI(w, "📍 서울 강남 기준");
  } catch {
    $("currentLocationText").textContent = "📍 연결 확인 필요";
  }
}

async function reverseGeocode(lat, lon) {
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&accept-language=ko`,
      { headers: { "Accept": "application/json" } }
    );
    if (!res.ok) return null;
    const json = await res.json();
    const a = json.address || {};
    return a.city_district || a.suburb || a.neighbourhood || a.quarter || a.town || a.village || a.city || a.county || null;
  } catch { return null; }
}

async function applyCurrentPosition(pos) {
  try {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const key = `${lat.toFixed(3)},${lon.toFixed(3)}`;
    const w = await fetchWeather(lat, lon);

    if (key !== state.lastLocationKey || !state.lastLocationLabel) {
      state.lastLocationKey = key;
      const name = await reverseGeocode(lat, lon);
      state.lastLocationLabel = name ? `📍 ${name}` : `📍 ${lat.toFixed(2)}, ${lon.toFixed(2)}`;
    }
    applyWeatherToUI(w, state.lastLocationLabel);
  } catch {
    await loadDefaultWeather();
  }
}

async function loadCurrentWeather() {
  if (!navigator.geolocation) { await loadDefaultWeather(); return; }
  navigator.geolocation.getCurrentPosition(
    pos => applyCurrentPosition(pos),
    () => loadDefaultWeather(),
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
  );
}

function watchCurrentLocation() {
  if (!navigator.geolocation || state.locationWatchId !== null) return;
  state.locationWatchId = navigator.geolocation.watchPosition(
    pos => applyCurrentPosition(pos),
    () => {},
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
  );
}

/* ── 예측 생성 로직 ── */
function hasWeatherIssue(w) {
  return w.rainProb >= 35 || w.precipitation > 0 || w.wind >= 8 || Math.abs(w.tempDiff) >= 5 || w.temp >= 30 || w.temp <= 0;
}
function getModeBonus(region) {
  const weekend = [0, 6].includes(new Date().getDay());
  let bonus = 0;
  if (weekend) {
    if (region.type === "travel") bonus += 28;
    if (region.type === "beach") bonus += 25;
    if (region.type === "airport") bonus += 20;
    if (region.type === "hotplace") bonus += 20;
  } else {
    if (region.type === "business") bonus += 24;
    if (region.type === "city") bonus += 16;
    if (region.type === "hotplace") bonus += 12;
  }
  return bonus;
}
function getWeatherScore(w, region) {
  let score = region.weight + getModeBonus(region);
  if (w.rainProb >= 70) score += 45;
  else if (w.rainProb >= 35) score += 28;
  if (w.precipitation > 0) score += 40;
  if (w.wind >= 8) score += 24;
  if (Math.abs(w.tempDiff) >= 5) score += 22;
  if (w.temp >= 30) score += 20;
  if (w.temp <= 0) score += 20;
  return score;
}
function makePrediction(region, w, score, window) {
  let title = `${region.name}, ${window.targetLabel} 비 올까?`;
  let yesLabel = "온다", noLabel = "안 온다", base = w.rainProb;

  if (w.wind >= 8) {
    title = `${region.name}, ${window.targetLabel} 바람 강할까?`;
    yesLabel = "세다"; noLabel = "약하다"; base = w.wind * 8;
  }
  if (w.temp >= 30) {
    title = `${region.name}, ${window.targetLabel} 덥게 느껴질까?`;
    yesLabel = "덥다"; noLabel = "괜찮다"; base = w.feelsLike * 2.4;
  }

  const yes = Math.max(5, Math.min(95, Math.round(base)));
  const no = 100 - yes;

  return {
    id: `${region.id}_${window.start.getTime()}`,
    regionId: region.id,
    region: region.name,
    title, yes, no, yesLabel, noLabel,
    yesStake: yes * 180,
    noStake: no * 120,
    total: score * 250,
    issue: "날씨 이슈",
    closeTimeMs: window.close.getTime(),
    startTimeMs: window.start.getTime(),
    endTimeMs: window.end.getTime(),
    resultTimeMs: window.result.getTime(),
    closeLabel: window.closeLabel,
    targetLabel: window.targetLabel,
    resultLabel: window.resultLabel
  };
}

async function savePredictionsToDB(list) {
  if (!db || !list.length) return;
  const rows = list.map(item => ({
    id: item.id,
    region_id: item.regionId,
    region_name: item.region,
    title: item.title,
    issue: item.issue,
    yes_label: item.yesLabel,
    no_label: item.noLabel,
    yes_percent: item.yes,
    no_percent: item.no,
    yes_stake: item.yesStake,
    no_stake: item.noStake,
    total_points: item.total,
    close_time: new Date(item.closeTimeMs).toISOString(),
    start_time: new Date(item.startTimeMs).toISOString(),
    end_time: new Date(item.endTimeMs).toISOString(),
    result_time: new Date(item.resultTimeMs).toISOString(),
    status: "open"
  }));
  const { error } = await db.from("wetty_predictions").upsert(rows, { onConflict: "id" });
  if (error) console.warn("savePredictionsToDB:", error.message);
}

async function buildPredictions() {
  if (!db) return;
  const w = getNextBettingWindow();

  // 이미 존재하는 예측 ID 일괄 확인
  const ids = REGION_POOL.map(r => `${r.id}_${w.start.getTime()}`);
  const { data: existing } = await db.from("wetty_predictions").select("id").in("id", ids);
  const existingSet = new Set((existing || []).map(r => r.id));

  // 날씨 병렬 조회 (Promise.allSettled — 일부 실패해도 나머지 처리)
  const results = await Promise.allSettled(
    REGION_POOL
      .filter(r => !existingSet.has(`${r.id}_${w.start.getTime()}`))
      .map(async region => {
        const weather = await fetchWeather(region.lat, region.lon);
        if (!hasWeatherIssue(weather)) return null;
        return makePrediction(region, weather, getWeatherScore(weather, region), w);
      })
  );

  const list = results
    .filter(r => r.status === "fulfilled" && r.value !== null)
    .map(r => r.value)
    .sort((a, b) => b.total - a.total)
    .slice(0, 7);

  await savePredictionsToDB(list);
}

// 변경된 카드만 업데이트하는 diffing 렌더러
function renderMarkets() {
  const box = $("marketList");
  const incoming = state.predictions;

  // 기존 카드 맵
  const existing = new Map();
  box.querySelectorAll(".market-card[data-pred-id]").forEach(el => {
    existing.set(el.dataset.predId, el);
  });

  const newIds = new Set(incoming.map(i => i.id));

  // 삭제된 카드 제거
  existing.forEach((el, id) => { if (!newIds.has(id)) el.remove(); });

  // 삽입/갱신
  incoming.forEach((item, idx) => {
    let card = existing.get(item.id);
    if (!card) {
      card = document.createElement("div");
      card.className = "market-card";
      card.dataset.predId = item.id;
      card.innerHTML = buildCardHTML(item);
      box.appendChild(card);
    } else {
      // 상태가 변경된 경우에만 내용 교체
      const newHTML = buildCardHTML(item);
      if (card.dataset.lastHtml !== newHTML) {
        card.innerHTML = newHTML;
        card.dataset.lastHtml = newHTML;
      }
    }
  });
}

    regionId: "gangnam",
    region: "서울 강남",
    title: `서울 강남, ${w.targetLabel} 비 올까?`,
    yes: 48, no: 52,
    yesLabel: "온다", noLabel: "안 온다",
    yesStake: 8400, noStake: 9200, total: 17600,
    issue: "기본 예측",
    closeTimeMs: w.close.getTime(),
    startTimeMs: w.start.getTime(),
    endTimeMs: w.end.getTime(),
    resultTimeMs: w.result.getTime(),
    closeLabel: w.closeLabel,
    targetLabel: w.targetLabel,
    resultLabel: w.resultLabel
  }];
  renderMarkets();
  renderHotList();
}

async function loadPredictionsFromDB() {
  if (!db) { renderDemoPredictions(); return; }
  try {
    const { data, error } = await db
      .from("wetty_predictions")
      .select("*")
      .eq("status", "open")
      .gt("close_time", new Date().toISOString())
      .order("total_points", { ascending: false })
      .limit(7);

    if (error) throw error;
    state.predictions = (data || []).map(mapPredictionRow);

    if (!state.predictions.length) { renderDemoPredictions(); return; }
    renderMarkets();
    renderHotList();
  } catch (e) {
    console.warn("loadPredictionsFromDB:", e);
    renderDemoPredictions();
  }
}

function renderClosed() {
  $("closedList").innerHTML = `<div class="market-card closed">
    <div class="market-region">CLOSED</div>
    <div class="market-title">아직 마감된 예측이 없습니다</div>
    <div class="closed-badge">결과 대기 없음</div>
  </div>`;
}

/* ── 유저 정보 갱신 (서버 경유) ── */
async function refreshUser() {
  if (!state.user) return;
  try {
    const res = await fetch("/api/me", { headers: { "X-User-Id": state.user.id } });
    if (!res.ok) return;
    const json = await res.json();
    if (json.ok && json.user) {
      applyUser(json.user);
      saveSession(json.user);
    }
  } catch {
    // 서버 미구현 환경 무시
  }
}

/* ── 투표 (서버 라우트 경유 — DB 직접 접근 제거) ── */
function openConfirm(title, body, onOk) {
  $("confirmTitle").textContent = title;
  $("confirmBody").textContent = body;
  $("confirmModal").classList.add("show");
  $("confirmModal").dataset.pending = "1";
  state.pendingVote = { onOk };
}
function closeConfirm() {
  $("confirmModal").classList.remove("show");
  state.pendingVote = null;
}

async function vote(predictionId, choice, btn) {
  if (!state.user) return toast("로그인이 필요합니다");
  if (predictionId === "demo_gangnam") return toast("실제 예측 카드에서 참여 가능합니다");

  const item = state.predictions.find(p => p.id === predictionId);
  if (!item) return;
  if (isMarketClosed(item)) return toast("이미 마감된 예측입니다");

  const label = choice === "yes" ? item.yesLabel : item.noLabel;

  openConfirm(
    item.title,
    `'${label}'에 참여할까요? 참여 포인트: 100P`,
    async () => {
      setButtonLoading(btn, true, "참여중...");
      try {
        // vote/checkin 은 서버 API로만 처리 (클라이언트 직접 DB 접근 없음)
        const res = await fetch("/api/vote", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-User-Id": state.user.id
          },
          body: JSON.stringify({ prediction_id: predictionId, choice, points: 100 })
        });
        const json = await res.json();
        if (!json.ok) return toast(json.message || "참여 실패");

        // 낙관적 UI 업데이트
        item.total = Number(item.total || 0) + 100;
        if (choice === "yes") item.yesStake = Number(item.yesStake || 0) + 100;
        else item.noStake = Number(item.noStake || 0) + 100;
        const totalStake = Number(item.yesStake || 0) + Number(item.noStake || 0);
        if (totalStake > 0) {
          item.yes = Math.round((Number(item.yesStake || 0) / totalStake) * 100);
          item.no = 100 - item.yes;
        }

        renderMarkets();
        renderHotList();
        toast(`${label} 참여 완료`);
        await refreshUser();
      } catch (e) {
        console.error(e);
        toast("참여 처리 실패");
      } finally {
        setButtonLoading(btn, false);
      }
    }
  );
}

/* ── 출석 (서버 라우트 경유) ── */
async function checkin(btn) {
  if (!state.user) return toast("로그인이 필요합니다");
  setButtonLoading(btn, true, "확인중...");
  try {
    const res = await fetch("/api/checkin", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-User-Id": state.user.id
      }
    });
    const json = await res.json();
    if (!json.ok) return toast(json.message || "출석 처리 실패");
    toast("출석 포인트 지급 완료");
    await refreshUser();
  } catch (e) {
    console.error(e);
    toast("출석 처리 실패");
  } finally {
    setButtonLoading(btn, false);
  }
}

/* ── 초대 ── */
function copyInvite() {
  const text = `WETTY BETTY 초대코드 : ${state.profile.referral}`;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => toast("초대코드 복사 완료")).catch(() => toast(text));
  } else {
    toast(text);
  }
}

/* ── 날씨 새로고침 ── */
async function refreshWeather() {
  state.weatherCache.clear();
  // sessionStorage 날씨 캐시 초기화
  Object.keys(sessionStorage).filter(k => k.startsWith("wx_")).forEach(k => sessionStorage.removeItem(k));
  state.lastLocationKey = "";
  state.lastLocationLabel = "";
  toast("날씨 새로고침 중");
  await loadCurrentWeather();
  await buildPredictions();
  await loadPredictionsFromDB();
}

/* ── Realtime 구독 ── */
function subscribeRealtime() {
  if (!db || state.realtimeChannel) return;
  try {
    state.realtimeChannel = db.channel("wetty-live")
      .on("postgres_changes", { event: "*", schema: "public", table: "wetty_predictions" }, () => loadPredictionsFromDB())
      .on("postgres_changes", { event: "*", schema: "public", table: "wetty_votes" }, () => loadPredictionsFromDB())
      .subscribe();
  } catch (e) { console.warn("realtime:", e); }
}

/* ── 앱 데이터 초기화 ── */
async function startAppData() {
  renderDemoPredictions();
  await loadCurrentWeather();
  watchCurrentLocation();
  await buildPredictions();
  await loadPredictionsFromDB();
  renderClosed();
  subscribeRealtime();

  // 인터벌 등록 (cleanup 대상)
  state.intervals.push(
    setInterval(async () => {
      if (!$("mainApp").classList.contains("hidden")) await loadCurrentWeather();
    }, 10 * 60 * 1000),

    setInterval(async () => {
      if (!$("mainApp").classList.contains("hidden")) {
        await buildPredictions();
        await loadPredictionsFromDB();
      }
    }, 10 * 60 * 1000)
  );
}

/* ── 이벤트 바인딩 ── */
function bindEnterKeys() {
  ["loginPhone", "loginPin"].forEach(id => $(id)?.addEventListener("keydown", e => {
    if (e.key === "Enter") login(document.querySelector('[data-action="login"]'));
  }));
  ["signupNick", "signupPhone", "signupPin"].forEach(id => $(id)?.addEventListener("keydown", e => {
    if (e.key === "Enter") signup(document.querySelector('[data-action="signup"]'));
  }));
}

function bindActions() {
  document.addEventListener("click", e => {
    const btn = e.target.closest("[data-action],[data-auth-tab]");
    if (!btn) return;

    if (btn.dataset.authTab) { setAuthMode(btn.dataset.authTab); return; }

    const action = btn.dataset.action;
    switch (action) {
      case "signup":         signup(btn); break;
      case "login":          login(btn); break;
      case "notice":         toast("새 알림이 없습니다"); break;
      case "profile":        $("profileModal").classList.add("show"); break;
      case "close-profile":  $("profileModal").classList.remove("show"); break;
      case "refresh":        refreshWeather(); break;
      case "checkin":        checkin(btn); break;
      case "copy-invite":    copyInvite(); break;
      case "logout":         logout(); break;
      case "vote":           vote(btn.dataset.id, btn.dataset.choice, btn); break;
      case "confirm-ok":
        if (state.pendingVote?.onOk) { closeConfirm(); state.pendingVote.onOk(); }
        break;
      case "confirm-cancel": closeConfirm(); break;
    }
  });

  // 오버레이 배경 클릭으로 닫기
  $("profileModal").addEventListener("click", e => { if (e.target === $("profileModal")) $("profileModal").classList.remove("show"); });
  $("confirmModal").addEventListener("click", e => { if (e.target === $("confirmModal")) closeConfirm(); });
}

/* ── 진입점 ── */
async function init() {
  bindActions();
  bindEnterKeys();
  syncProfile();
  renderDemoPredictions();

  const restored = await tryRestoreLogin();
  if (restored) {
    showApp();
    await startAppData();
  } else {
    showAuth();
  }
}

if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
else init();

})();
</script>

</html>
