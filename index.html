<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0" />
<title>WETTY BETTY</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#050d16;
  --panel:#0b1620;
  --line:rgba(255,255,255,.08);
  --text:#edf4fa;
  --muted:#7f93a2;
  --soft:#bfd0da;
  --accent:#dff56a;
  --blue:#82c7ff;
  --green:#b8ff7a;
  --red:#ff6f6f;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
}

body{
  padding-bottom:86px;
}

button,input{
  font-family:inherit;
}

button{
  border:0;
  cursor:pointer;
}

button:disabled{
  opacity:.45;
  cursor:not-allowed;
}

.app{
  width:100%;
  max-width:480px;
  margin:0 auto;
  min-height:100dvh;
  background:
    radial-gradient(circle at 50% -10%,rgba(223,245,106,.08),transparent 32%),
    linear-gradient(180deg,#07121c 0%,#050d16 52%,#050d16 100%);
}

.header{
  position:sticky;
  top:0;
  z-index:50;
  height:62px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  background:rgba(5,13,22,.94);
  backdrop-filter:blur(14px);
}

.logo{
  font-family:'Syne',sans-serif;
  font-size:22px;
  font-weight:900;
  letter-spacing:-1px;
}

.logo em{
  color:var(--accent);
  font-style:normal;
}

.sub{
  margin-top:2px;
  color:var(--muted);
  font-size:9px;
  font-weight:900;
  letter-spacing:1.2px;
}

.header-right{
  display:flex;
  align-items:center;
  gap:8px;
}

.icon-btn{
  width:38px;
  height:38px;
  border-radius:14px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--line);
  color:var(--text);
  font-size:15px;
}

.profile-mini{
  height:38px;
  padding:0 12px;
  border-radius:14px;
  display:flex;
  align-items:center;
  gap:7px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--line);
  color:var(--soft);
}

.pm-name{
  max-width:74px;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
  font-size:11px;
  font-weight:900;
}

.weather-board{
  position:relative;
  margin:12px 16px 14px;
  padding:20px;
  border-radius:28px;
  background:linear-gradient(145deg,#102131,#09131d);
  border:1px solid rgba(255,255,255,.06);
  overflow:hidden;
}

.refresh-btn{
  position:absolute;
  top:14px;
  right:14px;
  width:30px;
  height:30px;
  border-radius:10px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--line);
  color:var(--muted);
}

.weather-top{
  display:flex;
  justify-content:space-between;
  gap:12px;
}

.weather-kicker{
  display:inline-flex;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.06);
  border:1px solid var(--line);
  color:var(--soft);
  font-size:10px;
  font-weight:900;
}

.temp{
  margin-top:10px;
  font-family:'Syne',sans-serif;
  font-size:72px;
  line-height:.88;
  letter-spacing:-4px;
  font-weight:900;
}

.weather-desc{
  margin-top:10px;
  max-width:220px;
  color:var(--muted);
  font-size:12px;
  line-height:1.5;
}

.weather-icon{
  width:74px;
  height:74px;
  flex:0 0 74px;
  border-radius:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.05);
  border:1px solid var(--line);
  font-size:32px;
}

.weather-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:7px;
  margin-top:16px;
}

.weather-cell{
  padding:10px 8px;
  border-radius:14px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);
}

.weather-cell span{
  display:block;
  color:var(--muted);
  font-size:9px;
  font-weight:900;
}

.weather-cell strong{
  display:block;
  margin-top:5px;
  font-size:13px;
}

.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  padding:0 16px;
  margin-bottom:14px;
}

.main-btn,
.sub-btn,
.logout-btn{
  height:46px;
  border-radius:16px;
  font-size:13px;
  font-weight:900;
}

.main-btn{
  background:var(--accent);
  color:#07100c;
}

.sub-btn{
  background:rgba(255,255,255,.06);
  border:1px solid var(--line);
  color:var(--text);
}

.board{
  margin:0 16px 14px;
  padding:14px;
  border-radius:24px;
  background:rgba(255,255,255,.03);
  border:1px solid var(--line);
}

.board-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}

.board-head h2{
  font-size:14px;
  font-weight:900;
}

.board-head span{
  color:var(--accent);
  font-size:10px;
  font-weight:900;
}

.board-item{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:11px 0;
  border-top:1px solid var(--line);
}

.board-item:first-child{
  border-top:0;
}

.bi-title{
  font-size:13px;
  font-weight:900;
}

.bi-sub{
  margin-top:3px;
  color:var(--muted);
  font-size:11px;
}

.bi-right{
  color:var(--accent);
  font-size:13px;
  font-weight:900;
  white-space:nowrap;
}

.section-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:18px 16px 10px;
}

.section-title h2{
  font-size:15px;
  font-weight:900;
}

.section-title span{
  color:var(--muted);
  font-size:11px;
  font-weight:900;
}

.market-card{
  margin:0 16px 12px;
  padding:16px;
  border-radius:24px;
  background:linear-gradient(170deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
  border:1px solid var(--line);
}

.market-card.closed{
  opacity:.72;
}

.market-region{
  display:inline-flex;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(130,199,255,.08);
  border:1px solid rgba(130,199,255,.18);
  color:var(--blue);
  font-size:10px;
  font-weight:900;
}

.market-title{
  margin-top:12px;
  font-size:20px;
  line-height:1.3;
  font-weight:900;
}

.market-meta{
  margin-top:8px;
  display:flex;
  justify-content:space-between;
  gap:10px;
  color:var(--muted);
  font-size:11px;
}

.time-box{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:7px;
  margin-top:12px;
}

.time-cell{
  padding:9px 7px;
  border-radius:13px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);
}

.time-cell span{
  display:block;
  color:var(--muted);
  font-size:9px;
  font-weight:900;
}

.time-cell strong{
  display:block;
  margin-top:4px;
  color:var(--soft);
  font-size:11px;
  font-weight:900;
}

.market-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:14px;
}

.market-cell{
  padding:13px;
  border-radius:18px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);
}

.market-cell span{
  display:block;
  color:var(--muted);
  font-size:10px;
  font-weight:900;
}

.market-cell strong{
  display:block;
  margin-top:6px;
  font-family:'Syne',sans-serif;
  font-size:30px;
}

.market-cell small{
  display:block;
  margin-top:6px;
  color:var(--muted);
  font-size:10px;
  font-weight:900;
}

.vote-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:14px;
}

.vote-btn{
  height:46px;
  border-radius:15px;
  font-size:14px;
  font-weight:900;
}

.vote-btn.rain{
  background:rgba(130,199,255,.12);
  border:1px solid rgba(130,199,255,.22);
  color:var(--blue);
}

.vote-btn.clear{
  background:rgba(223,245,106,.08);
  border:1px solid rgba(223,245,106,.22);
  color:var(--accent);
}

.closed-badge{
  display:inline-flex;
  margin-top:10px;
  padding:6px 9px;
  border-radius:999px;
  background:rgba(255,255,255,.055);
  border:1px solid var(--line);
  color:var(--muted);
  font-size:10px;
  font-weight:900;
}

.closed-badge.done{
  color:var(--accent);
  background:rgba(223,245,106,.08);
  border-color:rgba(223,245,106,.18);
}

.bottom-nav{
  position:fixed;
  left:50%;
  bottom:0;
  transform:translateX(-50%);
  width:100%;
  max-width:480px;
  height:62px;
  display:flex;
  align-items:center;
  justify-content:space-around;
  background:rgba(5,13,22,.96);
  border-top:1px solid var(--line);
  backdrop-filter:blur(12px);
  z-index:9999;
  padding-bottom:env(safe-area-inset-bottom);
}

.nav-btn{
  flex:1;
  height:48px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
  background:none;
  color:var(--muted);
  font-size:9px;
  font-weight:900;
  border-radius:14px;
}

.nav-btn span{
  font-size:18px;
  line-height:1;
}

.nav-btn.active{
  color:var(--accent);
  background:rgba(223,245,106,.08);
}

.overlay{
  position:fixed;
  inset:0;
  display:none;
  align-items:flex-end;
  justify-content:center;
  background:rgba(0,0,0,.82);
  z-index:200;
}

.overlay.show{
  display:flex;
}

.sheet{
  width:100%;
  max-width:480px;
  padding:24px;
  border-radius:32px 32px 0 0;
  background:var(--panel);
  border:1px solid var(--line);
}

.sheet-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

.sheet-head h2{
  font-family:'Syne',sans-serif;
  font-size:22px;
}

.sheet-head p{
  margin-top:4px;
  color:var(--muted);
  font-size:12px;
}

.close-btn{
  width:34px;
  height:34px;
  border-radius:12px;
  background:rgba(255,255,255,.06);
  color:var(--text);
  font-size:18px;
}

.profile-stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:18px;
}

.profile-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:14px;
}

.profile-actions .main-btn,
.profile-actions .sub-btn{
  width:100%;
}

.stat-box{
  padding:12px 10px;
  border-radius:16px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);
}

.stat-box span{
  display:block;
  color:var(--muted);
  font-size:9px;
  font-weight:900;
}

.stat-box strong{
  display:block;
  margin-top:4px;
  font-size:16px;
}

.logout-btn{
  margin-top:8px;
  width:100%;
  background:rgba(255,111,111,.12);
  border:1px solid rgba(255,111,111,.22);
  color:var(--red);
}

.toast{
  position:fixed;
  left:50%;
  bottom:84px;
  transform:translateX(-50%) translateY(8px);
  padding:12px 18px;
  border-radius:999px;
  background:var(--text);
  color:#06100c;
  font-size:13px;
  font-weight:900;
  opacity:0;
  pointer-events:none;
  transition:.2s;
  z-index:10000;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
</style>
</head>

    </div>

    <div class="weather-grid">
      <div class="weather-cell">
        <span>체감</span>
        <strong id="feelsLike">--°</strong>
      </div>

      <div class="weather-cell">
        <span>강수</span>
        <strong id="rainChance">--%</strong>
      </div>

      <div class="weather-cell">
        <span>바람</span>
        <strong id="windSpeed">--</strong>
      </div>

      <div class="weather-cell">
        <span>변화</span>
        <strong id="tempDiff">--°</strong>

  <section class="board">
    <div class="board-head">

      <span>LIVE</span>
    </div>

  </section>

  <section class="section-title">
    <h2>TOP PICKS</h2>
    <span>실시간 참여 반영</span>
  </section>

  <div id="marketList"></div>

  <section class="section-title">
    <h2>마감된 예측</h2>
    <span>결과 대기 / 정산 완료</span>
  </section>

  <div id="closedList"></div>

</div>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="goHome()">
    <span>🏠</span>
    HOME
  </button>

  <button class="nav-btn" onclick="goPicks()">
    <span>⚡</span>
    PICKS
  </button>

  <button class="nav-btn" onclick="goRank()">
    <span>🏆</span>
    RANK
  </button>

  <button class="nav-btn" onclick="openProfile()">
    <span>👤</span>
    MY
  </button>
</nav>

<div class="overlay" id="profileModal">
  <div class="sheet">
    <div class="sheet-head">
      <div>
        <h2 id="profileName">PROFILE</h2>
        <p id="profileCode">초대코드 --</p>
      </div>
      <button class="close-btn" onclick="closeProfile()">×</button>
    </div>

    <div class="profile-stats">
      <div class="stat-box">
        <span>포인트</span>
        <strong id="profilePoint">0</strong>
      </div>

      <div class="stat-box">
        <span>적중률</span>
        <strong id="profileRate">0%</strong>
      </div>

      <div class="stat-box">
        <span>연승</span>
        <strong id="profileStreak">0</strong>
      </div>
    </div>

    <div class="profile-actions">
      <button class="main-btn" onclick="checkin()">출석 포인트 받기</button>
      <button class="sub-btn" onclick="copyInvite()">친구 초대 🎁</button>
    </div>

    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </div>
</div>

<div class="toast" id="toast"></div>

function pad2(n){
  return String(n).padStart(2,"0");
}

function timeLabel(date){
  return `${pad2(date.getHours())}:${pad2(date.getMinutes())}`;
}

function addMinutes(date,min){
  return new Date(date.getTime()+min*60000);
}

function localDateKey(date=new Date()){
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,"0");
  const d=String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}

function getNextBettingWindow(now=new Date()){
  const base=new Date(now);
  base.setMinutes(0,0,0);

  const currentHour=base.getHours();
  const nextEvenHour=currentHour % 2 === 0 ? currentHour + 2 : currentHour + 1;

  const start=new Date(base);
  start.setHours(nextEvenHour,0,0,0);

  if(start<=now){
    start.setHours(start.getHours()+2);
  }

  const end=addMinutes(start,120);
  const close=addMinutes(start,-30);
  const result=addMinutes(end,10);

  return {
    close,
    start,
    end,
    result,
    closeLabel:timeLabel(close),
    targetLabel:`${timeLabel(start)}~${timeLabel(end)}`,
    resultLabel:timeLabel(result)
  };
}

async function isKoreanHoliday(){
  if(!PUBLIC_HOLIDAY_SERVICE_KEY || PUBLIC_HOLIDAY_SERVICE_KEY.includes("여기에")){
    return false;
  }

  const today=new Date();
  const y=today.getFullYear();
  const m=String(today.getMonth()+1).padStart(2,"0");
  const todayKey=localDateKey(today);
  const cacheKey=`${y}-${m}`;

  if(holidayCache && holidayCache.key===cacheKey){
    return holidayCache.dates.includes(todayKey);
  }

  try{
    const url=`https://apis.data.go.kr/B090041/openapi/service/SpcdeInfoService/getRestDeInfo?serviceKey=${encodeURIComponent(PUBLIC_HOLIDAY_SERVICE_KEY)}&solYear=${y}&solMonth=${m}&_type=json`;
    const res=await fetch(url);
    if(!res.ok) return false;

    const json=await res.json();
    let items=json?.response?.body?.items?.item || [];
    if(!Array.isArray(items)) items=[items];

    const dates=items
      .filter(item=>item?.isHoliday==="Y" || item?.isHoliday===true)
      .map(item=>{
        const d=String(item.locdate);
        return `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`;
      });

    holidayCache={key:cacheKey,dates};
    return dates.includes(todayKey);
  }catch(e){
    return false;
  }
}

async function getDayMode(){
  const day=new Date().getDay();
  if(await isKoreanHoliday()) return "holiday";
  if(day===0 || day===6) return "weekend";
  return "weekday";
}

function modeLabel(mode){
  if(mode==="holiday") return "공휴일 이슈";
  if(mode==="weekend") return "주말 이슈";
  return "평일 이슈";
}

async function fetchWeather(lat,lon){
  const key=`${Number(lat).toFixed(2)},${Number(lon).toFixed(2)}`;
  const cached=weatherCache.get(key);

  if(cached && Date.now()-cached.ts<10*60*1000){
    return cached.data;
  }

  const url=
    `https://api.open-meteo.com/v1/forecast`+
    `?latitude=${lat}&longitude=${lon}`+
    `&current=temperature_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m`+
    `&hourly=precipitation_probability,temperature_2m`+
    `&past_days=1&forecast_days=1&timezone=Asia%2FSeoul`;

  const res=await fetch(url);
  if(!res.ok) throw new Error("weather error");

  const json=await res.json();
  const c=json.current || {};
  const hourly=json.hourly || {};
  const probs=hourly.precipitation_probability || [];
  const temps=hourly.temperature_2m || [];

  const temp=Number(c.temperature_2m || 0);
  const yesterdayTemp=Number(temps[0] || temp);

  const data={
    temp,
    feelsLike:Number(c.apparent_temperature || temp),
    precipitation:Number(c.precipitation || 0),
    code:Number(c.weather_code || 0),
    wind:Number(c.wind_speed_10m || 0),
    rainProb:Number(probs[0] || 0),
    tempDiff:Math.round(temp-yesterdayTemp)
  };

  weatherCache.set(key,{data,ts:Date.now()});
  return data;
}

function hasWeatherIssue(w){
  return w.rainProb>=35 || w.precipitation>0 || w.wind>=8 || Math.abs(w.tempDiff)>=5 || w.temp>=30 || w.temp<=0;
}

function getModeBonus(region,mode){
  let bonus=0;

  if(mode==="holiday"){
    if(region.type==="travel") bonus+=35;
    if(region.type==="airport") bonus+=32;
    if(region.type==="beach") bonus+=28;
    if(region.type==="hotplace") bonus+=18;
  }else if(mode==="weekend"){
    if(region.type==="travel") bonus+=28;
    if(region.type==="beach") bonus+=25;
    if(region.type==="airport") bonus+=20;
    if(region.type==="hotplace") bonus+=20;
  }else{
    if(region.type==="business") bonus+=24;
    if(region.type==="city") bonus+=16;
    if(region.type==="hotplace") bonus+=12;
  }

  return bonus;
}

function getWeatherScore(w,region,mode){
  let score=region.weight+getModeBonus(region,mode);

  if(w.rainProb>=70) score+=45;
  else if(w.rainProb>=35) score+=28;

  if(w.precipitation>0) score+=40;
  if(w.wind>=8) score+=24;
  if(Math.abs(w.tempDiff)>=5) score+=22;
  if(w.temp>=30) score+=20;
  if(w.temp<=0) score+=20;

  return score;
}

function makePrediction(region,w,score,mode,window){
  let title=`${region.name}, ${window.targetLabel} 비 올까?`;
  let yesLabel="온다";
  let noLabel="안 온다";
  let base=w.rainProb;

  if(w.wind>=8){
    title=`${region.name}, ${window.targetLabel} 바람 강할까?`;
    yesLabel="세다";
    noLabel="약하다";
    base=w.wind*8;
  }

  if(w.temp>=30){
    title=`${region.name}, ${window.targetLabel} 덥게 느껴질까?`;
    yesLabel="덥다";
    noLabel="괜찮다";
    base=w.feelsLike*2.4;
  }

  if(w.temp<=0){
    title=`${region.name}, ${window.targetLabel} 춥게 느껴질까?`;
    yesLabel="춥다";
    noLabel="괜찮다";
    base=70-w.feelsLike*2;
  }

  const yes=Math.max(5,Math.min(95,Math.round(base)));
  const no=100-yes;

  return {
    id:`${region.id}_${window.start.getTime()}`,
    regionId:region.id,
    region:region.name,
    title,
    yes,
    no,
    yesLabel,
    noLabel,
    yesStake:yes*180,
    noStake:no*120,
    total:score*250,
    issue:modeLabel(mode),
    closeTimeMs:window.close.getTime(),
    startTimeMs:window.start.getTime(),
    endTimeMs:window.end.getTime(),
    resultTimeMs:window.result.getTime(),
    closeLabel:window.closeLabel,
    targetLabel:window.targetLabel,
    resultLabel:window.resultLabel
  };
}

async function savePredictionsToDB(list){
  if(!list.length) return;

  const rows=list.map(item=>({
    id:item.id,
    region_id:item.regionId,
    region_name:item.region,
    title:item.title,
    issue:item.issue,
    yes_label:item.yesLabel,
    no_label:item.noLabel,
    yes_percent:item.yes,
    no_percent:item.no,
    yes_stake:item.yesStake,
    no_stake:item.noStake,
    total_points:item.total,
    close_time:new Date(item.closeTimeMs).toISOString(),
    start_time:new Date(item.startTimeMs).toISOString(),
    end_time:new Date(item.endTimeMs).toISOString(),
    result_time:new Date(item.resultTimeMs).toISOString(),
    status:"open"
  }));

  const {error}=await supabase
    .from("wetty_predictions")
    .upsert(rows,{onConflict:"id"});

  if(error){
    console.error(error);
  }
}

async function buildPredictions(){
  const mode=await getDayMode();
  const window=getNextBettingWindow();
  const list=[];

  for(const region of REGION_POOL){
    try{
      const predictionId=`${region.id}_${window.start.getTime()}`;

      const {data:exists}=await supabase
        .from("wetty_predictions")
        .select("id")
        .eq("id",predictionId)
        .maybeSingle();

      if(exists) continue;

      const w=await fetchWeather(region.lat,region.lon);
      if(!hasWeatherIssue(w)) continue;

      const score=getWeatherScore(w,region,mode);
      list.push(makePrediction(region,w,score,mode,window));
    }catch(e){}
  }

  const sorted=list.sort((a,b)=>b.total-a.total).slice(0,7);

  if(!sorted.length){
    const fallback={
      id:`fallback_gangnam_${window.start.getTime()}`,
      regionId:"gangnam",
      region:"서울 강남",
      title:`서울 강남, ${window.targetLabel} 비 올까?`,
      yes:48,
      no:52,
      yesLabel:"온다",
      noLabel:"안 온다",
      yesStake:8400,
      noStake:9200,
      total:17600,
      issue:"기본 예측",
      closeTimeMs:window.close.getTime(),
      startTimeMs:window.start.getTime(),
      endTimeMs:window.end.getTime(),
      resultTimeMs:window.result.getTime(),
      closeLabel:window.closeLabel,
      targetLabel:window.targetLabel,
      resultLabel:window.resultLabel
    };

    await savePredictionsToDB([fallback]);
    return;
  }

  await savePredictionsToDB(sorted);
}

async function refreshPredictionStats(predictionId){
  const {data,error}=await supabase
    .from("wetty_votes")
    .select("choice,points")
    .eq("prediction_id",predictionId);

  if(error){
    console.error(error);
    return;
  }

  const votes=data || [];
  const yesVotes=votes.filter(v=>v.choice==="yes");
  const noVotes=votes.filter(v=>v.choice==="no");

  const yesPoints=yesVotes.reduce((sum,v)=>sum+Number(v.points || 0),0);
  const noPoints=noVotes.reduce((sum,v)=>sum+Number(v.points || 0),0);
  const total=yesPoints+noPoints;

  if(total<=0) return;

  const yesPercent=Math.round((yesPoints/total)*100);
  const noPercent=100-yesPercent;

  const {error:updateError}=await supabase
    .from("wetty_predictions")
    .update({
      yes_percent:yesPercent,
      no_percent:noPercent,
      yes_stake:yesPoints,
      no_stake:noPoints,
      total_points:total
    })
    .eq("id",predictionId);

  if(updateError){
    console.error(updateError);
  }

  await loadPredictionsFromDB();
}

}

function weatherDesc(rainProb,precipitation){
  if(precipitation>0) return "현재 비가 감지되고 있습니다.";
  if(rainProb>=60) return "비 가능성이 높은 흐름입니다.";
  if(rainProb>=35) return "비가 올지 애매한 흐름입니다.";
  return "현재는 비교적 안정적인 날씨입니다.";
}

async function reverseGeocode(lat,lon){
  try{
    const url=`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&accept-language=ko`;
    const res=await fetch(url);
    if(!res.ok) return null;

    const json=await res.json();
    const addr=json.address || {};

    const city=addr.city || addr.county || addr.state || "";
    const district=addr.suburb || addr.city_district || addr.town || addr.village || addr.borough || "";
    const dong=addr.suburb || addr.neighbourhood || addr.quarter || addr.city_district || addr.town || addr.village || "";

    return dong || district || city || null;
  }catch(e){
    return null;
  }
}

async function applyCurrentPosition(pos){
  try{
    const lat=pos.coords.latitude;
    const lon=pos.coords.longitude;
    const locationKey=`${lat.toFixed(3)},${lon.toFixed(3)}`;

    const w=await fetchWeather(lat,lon);

    document.getElementById("currentTemp").textContent=`${Math.round(w.temp)}°`;
    document.getElementById("feelsLike").textContent=`${Math.round(w.feelsLike)}°`;
    document.getElementById("rainChance").textContent=`${w.rainProb}%`;
    document.getElementById("windSpeed").textContent=`${w.wind.toFixed(1)}m/s`;
    document.getElementById("tempDiff").textContent=`${w.tempDiff>=0?"+":""}${w.tempDiff}°`;
    document.getElementById("weatherIcon").textContent=getWeatherEmoji(w.code,w.rainProb,w.precipitation);
    document.getElementById("currentDesc").textContent=weatherDesc(w.rainProb,w.precipitation);

    if(locationKey!==lastLocationKey){
      lastLocationKey=locationKey;

      const locationName=await reverseGeocode(lat,lon);

      document.getElementById("currentLocationText").textContent=
        locationName ? `📍 ${locationName}` : "📍 현재 위치";
    }

  }catch(e){
    setWeatherFallback();
  }
}

async function loadCurrentWeather(){
  if(!navigator.geolocation){
    setWeatherFallback();
    return;
  }

  navigator.geolocation.getCurrentPosition(
    async pos=>{
      await applyCurrentPosition(pos);
    },
    ()=>{
      setWeatherFallback();
    },
    {
      enableHighAccuracy:true,
      timeout:10000,
      maximumAge:0
    }
  );
}

function watchCurrentLocation(){
  if(!navigator.geolocation) return;
  if(locationWatchId!==null) return;

  locationWatchId=navigator.geolocation.watchPosition(
    async pos=>{
      await applyCurrentPosition(pos);
    },
    ()=>{},
    {
      enableHighAccuracy:true,
      timeout:10000,
      maximumAge:60000
    }
  );
}

function setWeatherFallback(){
  document.getElementById("currentTemp").textContent="--°";
  document.getElementById("feelsLike").textContent="--°";
  document.getElementById("rainChance").textContent="--%";
  document.getElementById("windSpeed").textContent="--";
  document.getElementById("tempDiff").textContent="--°";
  document.getElementById("weatherIcon").textContent="🌤️";
  document.getElementById("currentDesc").textContent="위치 권한을 허용하면 현재 날씨가 표시됩니다.";
  document.getElementById("currentLocationText").textContent="📍 위치 권한 필요";
}

async function refreshWeather(){
  weatherCache.clear();
  lastLocationKey="";
  toast("날씨 새로고침 중 🌦️");
  await loadCurrentWeather();
  await buildPredictions();
  await loadPredictionsFromDB();
  await renderClosed();
}

function subscribeRealtime(){
  if(realtimeChannel) return;

  realtimeChannel=supabase
    .channel("wetty-live")
    .on(
      "postgres_changes",
      {
        event:"*",
        schema:"public",
        table:"wetty_predictions"
      },
      async()=>{
        await loadPredictionsFromDB();
        await renderClosed();
      }
    )
    .on(
      "postgres_changes",
      {
        event:"*",
        schema:"public",
        table:"wetty_votes"
      },
      async()=>{
        await loadPredictionsFromDB();
      }
    )
    .subscribe();
}

async function init(){
  syncProfile();

  await loadOrCreateUser();

  await loadCurrentWeather();
  watchCurrentLocation();

  await buildPredictions();
  await loadPredictionsFromDB();
  await renderClosed();

  subscribeRealtime();
}

init();

setInterval(async()=>{
  await loadCurrentWeather();
},10*60*1000);

setInterval(async()=>{
  await buildPredictions();
  await loadPredictionsFromDB();
  await renderClosed();
},10*60*1000);
</script>
