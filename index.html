<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0" />
<title>WETTY BETTY</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050d16;
  --panel:#0b1620;
  --line:rgba(255,255,255,.08);
  --text:#edf4fa;
  --muted:#7f93a2;
  --soft:#bfd0da;
  --accent:#dff56a;
  --blue:#82c7ff;
  --green:#b8ff7a;
  --red:#ff6f6f;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
}

body{
  padding-bottom:86px;
}

button,input{
  font-family:inherit;
}

button{
  border:0;
  cursor:pointer;
}

.app{
  width:100%;
  max-width:480px;
  margin:0 auto;
  min-height:100dvh;
  background:
    radial-gradient(circle at 50% -10%,rgba(223,245,106,.08),transparent 32%),
    linear-gradient(180deg,#07121c 0%,#050d16 52%,#050d16 100%);
}

.header{
  position:sticky;
  top:0;
  z-index:50;
  height:62px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  background:rgba(5,13,22,.94);
  backdrop-filter:blur(14px);
}

.logo{
  font-family:'Syne',sans-serif;
  font-size:22px;
  font-weight:900;
  letter-spacing:-1px;
}

.logo em{
  color:var(--accent);
  font-style:normal;
}

.sub{
  margin-top:2px;
  color:var(--muted);
  font-size:9px;
  font-weight:900;
  letter-spacing:1.2px;
}

.header-right{
  display:flex;
  align-items:center;
  gap:8px;
}

.icon-btn{
  width:38px;
  height:38px;
  border-radius:14px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--line);
  color:var(--text);
  font-size:15px;
}

.profile-mini{
  height:38px;
  padding:0 12px;
  border-radius:14px;
  display:flex;
  align-items:center;
  gap:7px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--line);
  color:var(--soft);
}

.pm-name{
  max-width:74px;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
  font-size:11px;
  font-weight:900;
}

.weather-board{
  position:relative;
  margin:12px 16px 14px;
  padding:20px;
  border-radius:28px;
  background:linear-gradient(145deg,#102131,#09131d);
  border:1px solid rgba(255,255,255,.06);
  overflow:hidden;
}

.refresh-btn{
  position:absolute;
  top:14px;
  right:14px;
  width:30px;
  height:30px;
  border-radius:10px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--line);
  color:var(--muted);
}

.weather-top{
  display:flex;
  justify-content:space-between;
  gap:12px;
}

.weather-kicker{
  display:inline-flex;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.06);
  border:1px solid var(--line);
  color:var(--soft);
  font-size:10px;
  font-weight:900;
}

.temp{
  margin-top:10px;
  font-family:'Syne',sans-serif;
  font-size:72px;
  line-height:.88;
  letter-spacing:-4px;
  font-weight:900;
}

.weather-desc{
  margin-top:10px;
  max-width:220px;
  color:var(--muted);
  font-size:12px;
  line-height:1.5;
}

.weather-icon{
  width:74px;
  height:74px;
  flex:0 0 74px;
  border-radius:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.05);
  border:1px solid var(--line);
  font-size:32px;
}

.weather-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:7px;
  margin-top:16px;
}

.weather-cell{
  padding:10px 8px;
  border-radius:14px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);
}

.weather-cell span{
  display:block;
  color:var(--muted);
  font-size:9px;
  font-weight:900;
}

.weather-cell strong{
  display:block;
  margin-top:5px;
  font-size:13px;
}

.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  padding:0 16px;
  margin-bottom:14px;
}

.main-btn,
.sub-btn,
.logout-btn{
  height:46px;
  border-radius:16px;
  font-size:13px;
  font-weight:900;
}

.main-btn{
  background:var(--accent);
  color:#07100c;
}

.sub-btn{
  background:rgba(255,255,255,.06);
  border:1px solid var(--line);
  color:var(--text);
}

.board{
  margin:0 16px 14px;
  padding:14px;
  border-radius:24px;
  background:rgba(255,255,255,.03);
  border:1px solid var(--line);
}

.board-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}

.board-head h2{
  font-size:14px;
  font-weight:900;
}

.board-head span{
  color:var(--accent);
  font-size:10px;
  font-weight:900;
}

.board-item{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:11px 0;
  border-top:1px solid var(--line);
}

.board-item:first-child{
  border-top:0;
}

.bi-title{
  font-size:13px;
  font-weight:900;
}

.bi-sub{
  margin-top:3px;
  color:var(--muted);
  font-size:11px;
}

.bi-right{
  color:var(--accent);
  font-size:13px;
  font-weight:900;
  white-space:nowrap;
}

.section-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:18px 16px 10px;
}

.section-title h2{
  font-size:15px;
  font-weight:900;
}

.section-title span{
  color:var(--muted);
  font-size:11px;
  font-weight:900;
}

.market-card{
  margin:0 16px 12px;
  padding:16px;
  border-radius:24px;
  background:linear-gradient(170deg,rgba(255,255,255,.05),rgba(255,255,255,.02));
  border:1px solid var(--line);
}

.market-region{
  display:inline-flex;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(130,199,255,.08);
  border:1px solid rgba(130,199,255,.18);
  color:var(--blue);
  font-size:10px;
  font-weight:900;
}

.market-title{
  margin-top:12px;
  font-size:20px;
  line-height:1.3;
  font-weight:900;
}

.market-meta{
  margin-top:8px;
  display:flex;
  justify-content:space-between;
  gap:10px;
  color:var(--muted);
  font-size:11px;
}

.market-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:14px;
}

.market-cell{
  padding:13px;
  border-radius:18px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);
}

.market-cell span{
  display:block;
  color:var(--muted);
  font-size:10px;
  font-weight:900;
}

.market-cell strong{
  display:block;
  margin-top:6px;
  font-family:'Syne',sans-serif;
  font-size:30px;
}

.market-cell small{
  display:block;
  margin-top:6px;
  color:var(--muted);
  font-size:10px;
  font-weight:900;
}

.vote-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:14px;
}

.vote-btn{
  height:46px;
  border-radius:15px;
  font-size:14px;
  font-weight:900;
}

.vote-btn.rain{
  background:rgba(130,199,255,.12);
  border:1px solid rgba(130,199,255,.22);
  color:var(--blue);
}

.vote-btn.clear{
  background:rgba(223,245,106,.08);
  border:1px solid rgba(223,245,106,.22);
  color:var(--accent);
}

.bottom-nav{
  position:fixed;
  left:50%;
  bottom:0;
  transform:translateX(-50%);
  width:100%;
  max-width:480px;
  height:62px;
  display:flex;
  align-items:center;
  justify-content:space-around;
  background:rgba(5,13,22,.96);
  border-top:1px solid var(--line);
  backdrop-filter:blur(12px);
  z-index:9999;
  padding-bottom:env(safe-area-inset-bottom);
}

.nav-btn{
  flex:1;
  height:48px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
  background:none;
  color:var(--muted);
  font-size:9px;
  font-weight:900;
  border-radius:14px;
}

.nav-btn span{
  font-size:18px;
  line-height:1;
}

.nav-btn.active{
  color:var(--accent);
  background:rgba(223,245,106,.08);
}

.overlay{
  position:fixed;
  inset:0;
  display:none;
  align-items:flex-end;
  justify-content:center;
  background:rgba(0,0,0,.82);
  z-index:200;
}

.overlay.show{
  display:flex;
}

.sheet{
  width:100%;
  max-width:480px;
  padding:24px;
  border-radius:32px 32px 0 0;
  background:var(--panel);
  border:1px solid var(--line);
}

.sheet-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

.sheet-head h2{
  font-family:'Syne',sans-serif;
  font-size:22px;
}

.sheet-head p{
  margin-top:4px;
  color:var(--muted);
  font-size:12px;
}

.close-btn{
  width:34px;
  height:34px;
  border-radius:12px;
  background:rgba(255,255,255,.06);
  color:var(--text);
  font-size:18px;
}

.profile-stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:18px;
}

.stat-box{
  padding:12px 10px;
  border-radius:16px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);
}

.stat-box span{
  display:block;
  color:var(--muted);
  font-size:9px;
  font-weight:900;
}

.stat-box strong{
  display:block;
  margin-top:4px;
  font-size:16px;
}

.logout-btn{
  margin-top:8px;
  width:100%;
  background:rgba(255,111,111,.12);
  border:1px solid rgba(255,111,111,.22);
  color:var(--red);
}

.toast{
  position:fixed;
  left:50%;
  bottom:84px;
  transform:translateX(-50%) translateY(8px);
  padding:12px 18px;
  border-radius:999px;
  background:var(--text);
  color:#06100c;
  font-size:13px;
  font-weight:900;
  opacity:0;
  pointer-events:none;
  transition:.2s;
  z-index:10000;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
</style>
</head>

<body>
<div class="app">

  <header class="header">
    <div>
      <div class="logo">WETTY <em>BETTY</em></div>
      <div class="sub">WEATHER PICK CLUB</div>
    </div>

    <div class="header-right">
      <button class="icon-btn" onclick="toast('새 알림이 없습니다 🔔')">🔔</button>

      <button class="profile-mini" onclick="openProfile()">
        <span>👤</span>
        <span class="pm-name" id="nickname">GUEST</span>
      </button>
    </div>
  </header>

  <section class="weather-board">
    <button class="refresh-btn" onclick="refreshWeather()">↻</button>

    <div class="weather-top">
      <div>
        <div class="weather-kicker" id="currentLocationText">📍 현재 날씨</div>
        <div class="temp" id="currentTemp">--°</div>
        <div class="weather-desc" id="currentDesc">위치 권한을 허용하면 현재 날씨가 표시됩니다.</div>
      </div>

      <div class="weather-icon" id="weatherIcon">🌤️</div>
    </div>

    <div class="weather-grid">
      <div class="weather-cell">
        <span>체감</span>
        <strong id="feelsLike">--°</strong>
      </div>

      <div class="weather-cell">
        <span>강수</span>
        <strong id="rainChance">--%</strong>
      </div>

      <div class="weather-cell">
        <span>바람</span>
        <strong id="windSpeed">--</strong>
      </div>

      <div class="weather-cell">
        <span>변화</span>
        <strong id="tempDiff">--°</strong>
      </div>
    </div>
  </section>

  <div class="actions">
    <button class="main-btn" onclick="checkin()">출석 포인트 받기</button>
    <button class="sub-btn" onclick="copyInvite()">친구 초대 🎁</button>
  </div>

  <section class="board">
    <div class="board-head">
      <h2>지금 몰리는 지역</h2>
      <span>LIVE</span>
    </div>
    <div id="hotList"></div>
  </section>

  <section class="section-title">
    <h2>TOP PICKS</h2>
    <span>실시간 예측</span>
  </section>

  <div id="marketList"></div>

</div>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="goHome()">
    <span>🏠</span>
    HOME
  </button>

  <button class="nav-btn" onclick="goPicks()">
    <span>⚡</span>
    PICKS
  </button>

  <button class="nav-btn" onclick="goRank()">
    <span>🏆</span>
    RANK
  </button>

  <button class="nav-btn" onclick="openProfile()">
    <span>👤</span>
    MY
  </button>
</nav>

<div class="overlay" id="profileModal">
  <div class="sheet">
    <div class="sheet-head">
      <div>
        <h2 id="profileName">PROFILE</h2>
        <p id="profileCode">초대코드 --</p>
      </div>
      <button class="close-btn" onclick="closeProfile()">×</button>
    </div>

    <div class="profile-stats">
      <div class="stat-box">
        <span>포인트</span>
        <strong id="profilePoint">0</strong>
      </div>

      <div class="stat-box">
        <span>적중률</span>
        <strong id="profileRate">0%</strong>
      </div>

      <div class="stat-box">
        <span>연승</span>
        <strong id="profileStreak">0</strong>
      </div>
    </div>

    <button class="main-btn" style="width:100%;margin-top:12px" onclick="copyInvite()">초대코드 복사 🎁</button>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let profile={
  nickname:"WETTY",
  points:12800,
  hitRate:72,
  streak:5,
  referral:"WETTY777"
};

let predictions=[
  {
    id:1,
    region:"서울 강남",
    title:"오늘 밤 비 올까?",
    yes:68,
    no:32,
    yesLabel:"온다",
    noLabel:"안 온다",
    yesStake:14200,
    noStake:6100,
    total:20300
  },
  {
    id:2,
    region:"부산 해운대",
    title:"내일 오전 바람 강할까?",
    yes:54,
    no:46,
    yesLabel:"세다",
    noLabel:"약하다",
    yesStake:9100,
    noStake:7800,
    total:16900
  },
  {
    id:3,
    region:"제주",
    title:"주말 비 시작될까?",
    yes:81,
    no:19,
    yesLabel:"온다",
    noLabel:"안 온다",
    yesStake:30100,
    noStake:4200,
    total:34300
  },
  {
    id:4,
    region:"서울 성수",
    title:"퇴근길 소나기 올까?",
    yes:47,
    no:53,
    yesLabel:"온다",
    noLabel:"안 온다",
    yesStake:8200,
    noStake:9400,
    total:17600
  }
];

let selectedNav=0;
let toastTimer=null;

function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg;
  el.classList.add("show");

  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{
    el.classList.remove("show");
  },1800);
}

function syncProfile(){
  document.getElementById("nickname").textContent=profile.nickname;
  document.getElementById("profileName").textContent=profile.nickname;
  document.getElementById("profileCode").textContent=`초대코드 ${profile.referral}`;
  document.getElementById("profilePoint").textContent=`${profile.points.toLocaleString()}P`;
  document.getElementById("profileRate").textContent=`${profile.hitRate}%`;
  document.getElementById("profileStreak").textContent=profile.streak;
}

function renderHotList(){
  const box=document.getElementById("hotList");
  box.innerHTML="";

  const sorted=[...predictions]
    .sort((a,b)=>b.total-a.total)
    .slice(0,3);

  sorted.forEach((item,index)=>{
    const div=document.createElement("div");
    div.className="board-item";

    div.innerHTML=`
      <div>
        <div class="bi-title">${index+1}. ${item.region}</div>
        <div class="bi-sub">${item.title}</div>
      </div>
      <div class="bi-right">${item.total.toLocaleString()}P</div>
    `;

    box.appendChild(div);
  });
}

function renderMarkets(){
  const box=document.getElementById("marketList");
  box.innerHTML="";

  predictions.forEach(item=>{
    const card=document.createElement("div");
    card.className="market-card";

    card.innerHTML=`
      <div class="market-region">${item.region}</div>

      <div class="market-title">${item.title}</div>

      <div class="market-meta">
        <span>실시간 참여</span>
        <span>${item.total.toLocaleString()}P</span>
      </div>

      <div class="market-grid">
        <div class="market-cell">
          <span>${item.yesLabel}</span>
          <strong>${item.yes}%</strong>
          <small>${item.yesStake.toLocaleString()}P</small>
        </div>

        <div class="market-cell">
          <span>${item.noLabel}</span>
          <strong>${item.no}%</strong>
          <small>${item.noStake.toLocaleString()}P</small>
        </div>
      </div>

      <div class="vote-row">
        <button class="vote-btn rain" onclick="vote('${item.title}','${item.yesLabel}')">
          ${item.yesLabel}
        </button>

        <button class="vote-btn clear" onclick="vote('${item.title}','${item.noLabel}')">
          ${item.noLabel}
        </button>
      </div>
    `;

    box.appendChild(card);
  });
}

function vote(title,choice){
  const ok=confirm(`${title}\n\n'${choice}'에 참여할까요?`);
  if(!ok) return;

  toast(`${choice} 참여 완료 ✓`);
}

function checkin(){
  profile.points+=100;
  syncProfile();
  toast("출석 포인트 지급 완료 🎉");
}

function copyInvite(){
  const text=`WETTY BETTY 초대코드 : ${profile.referral}`;

  if(navigator.clipboard){
    navigator.clipboard.writeText(text);
    toast("초대코드 복사 완료 🎁");
  }else{
    toast(text);
  }
}

function openProfile(){
  document.getElementById("profileModal").classList.add("show");
}

function closeProfile(){
  document.getElementById("profileModal").classList.remove("show");
}

function logout(){
  closeProfile();
  toast("로그아웃 완료");
}

function setActiveNav(index){
  selectedNav=index;

  document.querySelectorAll(".nav-btn").forEach((btn,i)=>{
    btn.classList.toggle("active",i===index);
  });
}

function goHome(){
  setActiveNav(0);
  window.scrollTo({top:0,behavior:"smooth"});
}

function goPicks(){
  setActiveNav(1);
  document.getElementById("marketList")?.scrollIntoView({
    behavior:"smooth",
    block:"start"
  });
}

function goRank(){
  setActiveNav(2);
  document.querySelector(".board")?.scrollIntoView({
    behavior:"smooth",
    block:"start"
  });
}

function getWeatherEmoji(code,rainProb,precipitation){
  if(precipitation>0) return "🌧️";
  if(rainProb>=60) return "☔";
  if(rainProb>=35) return "🌦️";
  if([0,1].includes(code)) return "☀️";
  if([2,3,45,48].includes(code)) return "☁️";
  return "🌤️";
}

function weatherDesc(rainProb,precipitation){
  if(precipitation>0) return "현재 비가 감지되고 있습니다.";
  if(rainProb>=60) return "비 가능성이 높은 흐름입니다.";
  if(rainProb>=35) return "비가 올지 애매한 흐름입니다.";
  return "현재는 비교적 안정적인 날씨입니다.";
}

async function fetchWeather(lat,lon){
  const url=
    `https://api.open-meteo.com/v1/forecast`+
    `?latitude=${lat}&longitude=${lon}`+
    `&current=temperature_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m`+
    `&hourly=precipitation_probability,temperature_2m`+
    `&past_days=1&forecast_days=1&timezone=Asia%2FSeoul`;

  const res=await fetch(url);
  if(!res.ok) throw new Error("weather error");

  const json=await res.json();
  const c=json.current||{};
  const hourly=json.hourly||{};
  const probs=hourly.precipitation_probability||[];
  const temps=hourly.temperature_2m||[];

  const temp=Number(c.temperature_2m||0);
  const yesterdayTemp=Number(temps[0]||temp);

  return {
    temp,
    feelsLike:Number(c.apparent_temperature||temp),
    precipitation:Number(c.precipitation||0),
    code:Number(c.weather_code||0),
    wind:Number(c.wind_speed_10m||0),
    rainProb:Number(probs[0]||0),
    tempDiff:Math.round(temp-yesterdayTemp)
  };
}

async function loadCurrentWeather(){
  if(!navigator.geolocation){
    setWeatherFallback();
    return;
  }

  navigator.geolocation.getCurrentPosition(async pos=>{
    try{
      const lat=pos.coords.latitude;
      const lon=pos.coords.longitude;

      const w=await fetchWeather(lat,lon);

      document.getElementById("currentTemp").textContent=`${Math.round(w.temp)}°`;
      document.getElementById("feelsLike").textContent=`${Math.round(w.feelsLike)}°`;
      document.getElementById("rainChance").textContent=`${w.rainProb}%`;
      document.getElementById("windSpeed").textContent=`${w.wind.toFixed(1)}m/s`;
      document.getElementById("tempDiff").textContent=`${w.tempDiff>=0?"+":""}${w.tempDiff}°`;
      document.getElementById("weatherIcon").textContent=getWeatherEmoji(w.code,w.rainProb,w.precipitation);
      document.getElementById("currentDesc").textContent=weatherDesc(w.rainProb,w.precipitation);
      document.getElementById("currentLocationText").textContent="📍 현재 위치";

    }catch(e){
      setWeatherFallback();
    }
  },()=>{
    setWeatherFallback();
  });
}

function setWeatherFallback(){
  document.getElementById("currentTemp").textContent="--°";
  document.getElementById("feelsLike").textContent="--°";
  document.getElementById("rainChance").textContent="--%";
  document.getElementById("windSpeed").textContent="--";
  document.getElementById("tempDiff").textContent="--°";
  document.getElementById("weatherIcon").textContent="🌤️";
  document.getElementById("currentDesc").textContent="위치 권한을 허용하면 현재 날씨가 표시됩니다.";
  document.getElementById("currentLocationText").textContent="📍 위치 권한 필요";
}

function refreshWeather(){
  toast("날씨 새로고침 중 🌦️");
  loadCurrentWeather();
}

syncProfile();
renderHotList();
renderMarkets();
loadCurrentWeather();
</script>
