<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>WETTY BETTY</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#050d16;--panel:#0b1620;--line:rgba(255,255,255,.08);
  --text:#edf4fa;--muted:#8193a0;--soft:#b8c8c8;
  --accent:#dff56a;--blue:#82c7ff;--green:#b8ff7a;--red:#ff6f6f;
  --shadow:0 22px 64px rgba(0,0,0,.34);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif}
button,input{font-family:inherit}
button{cursor:pointer;border:0;transition:.12s}
button:active{transform:scale(.96);filter:brightness(1.12)}
.app{
  width:100%;max-width:480px;margin:0 auto;min-height:100dvh;padding:16px 16px 56px;
  background:
    radial-gradient(circle at 50% -10%,rgba(223,245,106,.10),transparent 34%),
    radial-gradient(circle at 100% 12%,rgba(130,199,255,.08),transparent 32%),
    linear-gradient(180deg,#07121c 0%,#050d16 46%,#050d16 100%);
}
.header{height:58px;display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
.logo{font-family:'Syne',sans-serif;font-size:23px;font-weight:900;letter-spacing:-1px}
.logo span{color:var(--accent)}
.sub{margin-top:5px;color:var(--muted);font-size:10px;font-weight:900;letter-spacing:1px}
.profileChip{width:138px;padding:9px 10px;border-radius:18px;background:rgba(255,255,255,.045);border:1px solid var(--line);text-align:right}
.profileName{color:var(--soft);font-size:11px;font-weight:900;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.points{margin-top:3px;color:var(--accent);font-size:12px;font-weight:900;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

.scoreBar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.scoreBar button,.scoreBar div{min-height:52px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid var(--line);padding:9px 8px;text-align:left}
.scoreBar span{display:block;color:var(--muted);font-size:9px;font-weight:900;letter-spacing:.7px}
.scoreBar b{display:block;margin-top:5px;color:var(--text);font-size:15px;font-weight:900}
.scoreBar button b{color:var(--accent)}

.weatherBoard{position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.07);background:#0d1823;border-radius:30px;padding:20px;margin-bottom:12px;box-shadow:var(--shadow)}
.weatherBoard:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,0));pointer-events:none}
.weatherTop{position:relative;z-index:1;display:flex;justify-content:space-between;gap:14px}
.kicker{display:inline-flex;padding:6px 9px;border-radius:999px;background:rgba(255,255,255,.055);border:1px solid var(--line);color:var(--soft);font-size:10px;font-weight:900}
.weatherTemp{margin-top:12px;font-family:'Syne',sans-serif;font-size:58px;line-height:.88;letter-spacing:-3px}
.weatherDesc{margin-top:12px;color:var(--muted);font-size:13px;line-height:1.55;max-width:260px}
.weatherIcon{width:76px;height:76px;flex:0 0 76px;border-radius:24px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.055);border:1px solid var(--line);font-size:34px}
.weatherGrid{position:relative;z-index:1;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:18px}
.weatherGrid div{padding:12px 10px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid var(--line)}
.weatherGrid span{display:block;color:var(--muted);font-size:10px;font-weight:900}
.weatherGrid b{display:block;margin-top:5px;color:var(--text);font-size:15px;font-weight:900}

.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.btn{height:44px;border-radius:15px;font-size:12px;font-weight:900;background:var(--accent);color:#07100d}
.btn.dark{background:rgba(255,255,255,.055);color:var(--text);border:1px solid var(--line)}

.board{border:1px solid var(--line);background:rgba(255,255,255,.035);border-radius:22px;padding:14px;margin:12px 0 16px}
.boardHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.boardHead h2{font-size:14px;font-weight:900}
.boardHead span{color:var(--accent);font-size:10px;font-weight:900}
.boardItem{display:flex;justify-content:space-between;gap:10px;padding:11px 0;border-top:1px solid var(--line)}
.boardItem:first-child{border-top:0}
.boardTitle{font-size:13px;font-weight:900}
.boardSub{margin-top:3px;color:var(--muted);font-size:11px}
.boardRight{color:var(--accent);font-size:13px;font-weight:900;white-space:nowrap}

.sectionHead{display:flex;justify-content:space-between;align-items:center;margin:18px 2px 10px}
.sectionHead h2{font-size:15px;font-weight:900}
.sectionHead span{color:var(--muted);font-size:11px;font-weight:900}

.card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.052),rgba(255,255,255,.02)),var(--panel);border-radius:25px;padding:16px;margin:10px 0;box-shadow:0 16px 42px rgba(0,0,0,.23)}
.card.small{padding:13px;border-radius:20px;box-shadow:none}
.marketTop{display:flex;justify-content:space-between;align-items:center;gap:10px}
.badge{display:inline-flex;padding:6px 10px;border-radius:999px;background:rgba(130,199,255,.095);border:1px solid rgba(130,199,255,.14);color:var(--blue);font-size:10px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.timer{color:var(--muted);font-size:10px;font-weight:900}
.card-title{margin-top:12px;font-size:22px;line-height:1.25;letter-spacing:-.8px;font-weight:900}
.card.small .card-title{font-size:15px;margin-top:9px}
.marketMeta{display:flex;justify-content:space-between;gap:8px;margin-top:9px;color:var(--muted);font-size:11px;line-height:1.45}
.official{color:var(--soft);font-weight:900;white-space:nowrap}
.odds{margin-top:15px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.odd{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:18px;padding:14px}
.odd label{display:block;color:var(--muted);font-size:10px;font-weight:900}
.odd strong{display:block;margin-top:7px;font-family:'Syne',sans-serif;font-size:32px;line-height:1}
.odd small{display:block;margin-top:7px;color:var(--muted);font-size:10px;font-weight:800}
.odd.rain strong{color:var(--blue)}.odd.clear strong{color:var(--green)}
.bar{margin-top:13px;height:8px;border-radius:999px;background:rgba(184,255,122,.2);overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,var(--blue),#b5e1ff)}

.entry{margin-top:14px}
.stakes{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.stakes button{height:38px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--soft);border-radius:13px;font-size:12px;font-weight:900}
.stakes button.active{background:var(--text);color:#050d16}
.pickBtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.pickBtns button{height:46px;border-radius:15px;font-size:14px;font-weight:900}
.pickBtns .rain{background:rgba(130,199,255,.14);border:1px solid rgba(130,199,255,.27);color:var(--blue)}
.pickBtns .clear{background:rgba(184,255,122,.12);border:1px solid rgba(184,255,122,.24);color:var(--green)}
.myPick{margin-top:13px;padding:12px;border-radius:15px;background:rgba(223,245,106,.075);border:1px solid rgba(223,245,106,.17);color:var(--accent);font-size:12px;font-weight:900}

.mood{margin-top:15px;border-top:1px solid var(--line);padding-top:13px}
.moodTitle{display:flex;justify-content:space-between;gap:8px;color:var(--soft);font-size:11px;font-weight:900;margin-bottom:9px}
.moodTitle span:last-child{color:var(--muted);white-space:nowrap}
.reactions{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.reactions button{height:38px;border-radius:13px;background:rgba(255,255,255,.04);color:var(--soft);border:1px solid var(--line);font-size:11px;font-weight:900}
.commentPreview,.comment{margin-top:8px;padding:10px 11px;border-radius:14px;background:rgba(255,255,255,.032);border:1px solid rgba(255,255,255,.055)}
.commentPreview b,.comment b{color:var(--accent);font-size:10px;font-weight:900}
.commentPreview p,.comment p{margin-top:4px;color:#dce7ee;font-size:12px;line-height:1.45}
.commentToggle{width:100%;height:38px;margin-top:9px;border-radius:13px;background:rgba(255,255,255,.045);border:1px solid var(--line);color:var(--soft);font-size:12px;font-weight:900}
.commentForm{display:flex;gap:7px;margin-top:10px}
.commentForm input{flex:1;min-width:0;height:42px;background:rgba(0,0,0,.18);color:var(--text);border:1px solid var(--line);border-radius:14px;padding:0 12px;font-size:12px;outline:none}
.commentForm button{width:58px;border-radius:14px;background:rgba(255,255,255,.075);color:var(--text);font-size:12px;font-weight:900}

.smallRow{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:10px}
.smallPercent{color:var(--soft);font-size:12px;font-weight:900}
.smallBtn{height:34px;padding:0 12px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--text);font-size:11px;font-weight:900}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;align-items:center;justify-content:center;padding:20px;z-index:100;backdrop-filter:blur(8px)}
.modal.show{display:flex}
.modalCard{width:100%;max-width:390px;max-height:86dvh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:var(--shadow)}
.modalTop{display:flex;justify-content:space-between;gap:12px}
.modalCard h2{font-size:24px;font-weight:900}
.closeBtn{width:34px;height:34px;border-radius:12px;background:rgba(255,255,255,.06);color:var(--text);font-weight:900}
.modalCard p{margin-top:8px;color:var(--muted);font-size:13px;line-height:1.5}
.modalCard input{width:100%;height:48px;margin-top:14px;border:1px solid var(--line);background:rgba(0,0,0,.2);color:var(--text);border-radius:16px;padding:0 14px;font-size:15px;outline:none}
.modalCard .btn{width:100%;margin-top:12px}
.profileStats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:18px}
.profileStats div{border:1px solid var(--line);background:rgba(255,255,255,.04);border-radius:17px;padding:12px 10px}
.profileStats span{display:block;color:var(--muted);font-size:10px;font-weight:900}
.profileStats b{display:block;margin-top:5px;color:var(--text);font-size:17px;font-weight:900}
.historyTitle{margin-top:20px;font-size:13px;font-weight:900;color:var(--soft)}
.historyItem{margin-top:9px;border:1px solid var(--line);background:rgba(255,255,255,.035);border-radius:16px;padding:12px}
.historyItem strong{display:block;font-size:13px;line-height:1.35}
.historyItem span{display:block;margin-top:5px;color:var(--muted);font-size:11px;font-weight:800}
.resultWin{color:var(--accent)}.resultLose{color:var(--red)}.resultPending{color:var(--blue)}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(8px);opacity:0;pointer-events:none;background:var(--text);color:#050d16;padding:12px 18px;border-radius:999px;font-size:13px;font-weight:900;transition:.2s;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{padding:20px 0;text-align:center;color:var(--muted);font-size:13px}
.liveToast{
  position:fixed;
  left:50%;
  bottom:78px;
  width:calc(100% - 32px);
  max-width:448px;
  transform:translateX(-50%) translateY(12px);
  opacity:0;
  z-index:210;
  padding:13px 15px;
  border-radius:18px;
  background:rgba(11,22,32,.96);
  border:1px solid rgba(223,245,106,.18);
  color:var(--text);
  font-size:13px;
  font-weight:900;
  box-shadow:0 18px 44px rgba(0,0,0,.42);
  transition:.22s ease;
  backdrop-filter:blur(10px);
}

.liveToast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
</style>
</head>

<body>
<div class="app">
  <header class="header">
    <div>
      <div class="logo">WETTY <span>BETTY</span></div>
      <div class="sub">WEATHER PICK CLUB</div>
    </div>
    <button class="profileChip" onclick="openProfile()">
      <div class="profileName" id="nickname">GUEST</div>
      <div class="points" id="pointsEl">0P</div>
    </button>
  </header>

  <section class="scoreBar">
    <button onclick="openProfile()"><span>적중률</span><b id="hitRateMini">0%</b></button>
    <div><span>참여</span><b id="picksMini">0</b></div>
    <div><span>적중</span><b id="winsMini">0</b></div>
    <div><span>연승</span><b id="streakMini">0</b></div>
  </section>

  <section class="weatherBoard">
    <div class="weatherTop">
      <div>
        <div class="kicker">현재 날씨</div>
        <h1 class="weatherTemp" id="currentTemp">--°</h1>
        <p class="weatherDesc" id="currentDesc">위치 권한을 허용하면 현재 날씨가 표시됩니다.</p>
      </div>
      <div class="weatherIcon" id="weatherIcon">🌤️</div>
    </div>
    <div class="weatherGrid">
      <div><span>체감</span><b id="feelsLike">--°</b></div>
      <div><span>1H 강수</span><b id="rainChance">--%</b></div>
      <div><span>바람</span><b id="windSpeed">--</b></div>
    </div>
  </section>

  <div class="actions">
    <button class="btn" id="checkinBtn" onclick="checkin()">출석 포인트 받기</button>
    <button class="btn dark" onclick="copyInvite()">친구 초대</button>
  </div>

  <section class="board" id="nearBoard" style="display:none">
    <div class="boardHead"><h2>지금 근처 예측</h2><span>NEARBY</span></div>
    <div id="nearList"></div>
  </section>

  <section class="board">
    <div class="boardHead"><h2>지금 몰리는 지역</h2><span>LIVE</span></div>
    <div id="hotList"></div>
  </section>

  <div class="sectionHead">
    <h2>TOP 5 예측</h2>
    <span>가장 많이 몰림</span>
  </div>
  <main id="topList"></main>

  <div class="sectionHead">
    <h2>그 외 예측</h2>
    <span>작게 보기</span>
  </div>
  <main id="otherList"></main>
</div>

<div class="modal" id="joinModal">
  <div class="modalCard">
    <h2>닉네임 만들기</h2>
    <p>첫 접속 보너스로 10,000 포인트를 지급합니다.</p>
    <input id="nickInput" placeholder="닉네임 입력" maxlength="12" onkeydown="if(event.key==='Enter')createProfile()" />
    <button class="btn" onclick="createProfile()">시작하기</button>
  </div>
</div>

<div class="modal" id="profileModal">
  <div class="modalCard">
    <div class="modalTop">
      <div>
        <h2 id="profileTitle">PROFILE</h2>
        <p id="profileSub">내 예측 기록과 스코어를 확인하세요.</p>
      </div>
      <button class="closeBtn" onclick="closeProfile()">×</button>
    </div>
    <div class="profileStats">
      <div><span>포인트</span><b id="modalCredit">0</b></div>
      <div><span>적중률</span><b id="modalHitRate">0%</b></div>
      <div><span>연승</span><b id="modalStreak">0</b></div>
      <div><span>참여</span><b id="modalPicks">0</b></div>
      <div><span>적중</span><b id="modalWins">0</b></div>
      <div><span>대기</span><b id="modalPending">0</b></div>
    </div>
    <button class="btn dark" onclick="copyInvite()">초대코드 복사</button>
    <div class="historyTitle">최근 기록</div>
    <div id="historyList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_GAME="/api/game";
const API_ACTION="/api/action";
const POLL_MS=15000;

let userKey=localStorage.getItem("wetty_user_key");
let selectedStake=100;
let profile=null;
let predictions=[];
let drafts={};
let scoreHistory=[];
let openComments={};
let userLocation=null;
let stats={totalPicks:0,wins:0,losses:0,pending:0,hitRate:0,currentStreak:0};

if(!userKey){
  userKey=crypto.randomUUID();
  localStorage.setItem("wetty_user_key",userKey);
}

let toastTimer=null;
function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove("show"),1900);
}

async function post(action,data={}){
  try{
    const res=await fetch(API_ACTION,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action,userKey,...data})
    });
    return await res.json();
  }catch(e){
    return {ok:false,message:"요청 실패"};
  }
}

function fmtTime(v){
  return new Date(v).toLocaleString("ko-KR",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});
}

function remaining(closeTime){
  if(!closeTime) return "마감 시간 없음";

  const diff = new Date(closeTime).getTime() - Date.now();

  if(Number.isNaN(diff)) return "시간 확인 필요";

  if(diff <= 0) return "마감";

  const totalMinutes = Math.ceil(diff / 60000);

  const days = Math.floor(totalMinutes / 1440);
  const hours = Math.floor((totalMinutes % 1440) / 60);
  const minutes = totalMinutes % 60;

  if(days > 0){
    return `${days}일 ${hours}시간 남음`;
  }

  if(hours > 0){
    return `${hours}시간 ${minutes}분 남음`;
  }

  return `${minutes}분 남음`;
}

function distanceKm(a,b,c,d){
  if(a==null||b==null||c==null||d==null)return 99999;
  const R=6371;
  const dLat=(c-a)*Math.PI/180;
  const dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

async function loadCurrentWeather(){
  try{
    if(!navigator.geolocation){setWeatherFallback();return;}

    navigator.geolocation.getCurrentPosition(async pos=>{
      const lat=pos.coords.latitude;
      const lon=pos.coords.longitude;
      userLocation={lat,lon};

      const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`+
      `&current=temperature_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m`+
      `&hourly=precipitation_probability&timezone=Asia%2FSeoul`;

      const data=await fetch(url).then(r=>r.json());
      const current=data.current||{};
      const hourly=data.hourly||{};
      const times=hourly.time||[];
      const probs=hourly.precipitation_probability||[];
      const nowHour=new Date().getHours();

      let rainProb=0;
      for(let i=0;i<times.length;i++){
        if(new Date(times[i]).getHours()===nowHour){
          rainProb=probs[i]??0;
          break;
        }
      }

      document.getElementById("currentTemp").textContent=`${Math.round(current.temperature_2m??0)}°`;
      document.getElementById("feelsLike").textContent=`${Math.round(current.apparent_temperature??0)}°`;
      document.getElementById("rainChance").textContent=`${rainProb}%`;
      document.getElementById("windSpeed").textContent=`${Number(current.wind_speed_10m??0).toFixed(1)}m/s`;

      const info=weatherText(current.weather_code,rainProb,current.precipitation);
      document.getElementById("currentDesc").textContent=info.desc;
      document.getElementById("weatherIcon").textContent=info.label;

      renderNearList();
    },()=>setWeatherFallback());
  }catch(e){setWeatherFallback();}
}

function weatherText(code,rainProb,precipitation){
  if((precipitation||0)>0)return{label:"🌧️",desc:"지금 비가 감지되고 있습니다. 아래 예측 흐름을 확인해보세요."};
  if(rainProb>=70)return{label:"☔",desc:"강수 가능성이 높습니다. 비 온다 쪽 선택이 몰릴 수 있어요."};
  if(rainProb>=40)return{label:"🌦️",desc:"애매한 하늘입니다. 사람들의 선택이 갈릴 가능성이 높아요."};
  if([0,1].includes(code))return{label:"☀️",desc:"현재는 비교적 맑습니다. 안 온다 쪽 흐름을 확인해보세요."};
  if([2,3,45,48].includes(code))return{label:"☁️",desc:"구름이 많습니다. 갑작스러운 변화에 주의하세요."};
  return{label:"🌤️",desc:"현재 날씨 기준으로 오늘의 예측을 확인해보세요."};
}

function setWeatherFallback(){
  document.getElementById("currentTemp").textContent="--°";
  document.getElementById("currentDesc").textContent="위치 권한을 허용하면 현재 날씨가 표시됩니다.";
  document.getElementById("feelsLike").textContent="--°";
  document.getElementById("rainChance").textContent="--%";
  document.getElementById("windSpeed").textContent="--";
  document.getElementById("weatherIcon").textContent="🌤️";
}

async function load(){
  const res=await fetch(`${API_GAME}?userKey=${encodeURIComponent(userKey)}`);
  const json=await res.json();

  if(!json.ok){toast(json.message||"불러오기 실패");return;}

  profile=json.profile;
  predictions=json.predictions||[];
  scoreHistory=json.scoreHistory||[];
  stats=json.stats||stats;

  if(!profile){
    document.getElementById("joinModal").classList.add("show");
    return;
  }

  document.getElementById("joinModal").classList.remove("show");
  document.getElementById("nickname").textContent=profile.nickname;
  document.getElementById("pointsEl").textContent=`${profile.points}P`;

  updateStatsUI();
  renderHotList();
  renderNearList();
  render();
  scheduleLiveBuzz();
}

function sortedPredictions(){
  return [...predictions].sort((a,b)=>{
    const scoreA=(a.totalStake||0)+(a.priority||0);
    const scoreB=(b.totalStake||0)+(b.priority||0);
    if(scoreB!==scoreA)return scoreB-scoreA;
    return new Date(a.close_time)-new Date(b.close_time);
  });
}

function updateStatsUI(){
  document.getElementById("hitRateMini").textContent=`${stats.hitRate||0}%`;
  document.getElementById("picksMini").textContent=stats.totalPicks||0;
  document.getElementById("winsMini").textContent=stats.wins||0;
  document.getElementById("streakMini").textContent=stats.currentStreak||0;

  document.getElementById("profileTitle").textContent=profile?.nickname||"PROFILE";
  document.getElementById("profileSub").textContent=`초대코드 ${profile?.referral_code||"-"}`;
  document.getElementById("modalCredit").textContent=profile?.points||0;
  document.getElementById("modalHitRate").textContent=`${stats.hitRate||0}%`;
  document.getElementById("modalStreak").textContent=stats.currentStreak||0;
  document.getElementById("modalPicks").textContent=stats.totalPicks||0;
  document.getElementById("modalWins").textContent=stats.wins||0;
  document.getElementById("modalPending").textContent=stats.pending||0;
  renderHistory();
}

function renderBoardItem(box,p,idx,rightText){
  const div=document.createElement("div");
  div.className="boardItem";
  const left=document.createElement("div");
  left.innerHTML=`<div class="boardTitle">${idx}. ${p.region}</div><div class="boardSub">${p.title} · 비 ${p.rainPercent}% / 안 옴 ${p.clearPercent}%</div>`;
  const right=document.createElement("div");
  right.className="boardRight";
  right.textContent=rightText;
  div.append(left,right);
  box.appendChild(div);
}

function renderHotList(){
  const box=document.getElementById("hotList");
  const hot=sortedPredictions().slice(0,3);
  if(!hot.length){
    box.innerHTML=`<div class="empty">아직 몰리는 지역이 없습니다.</div>`;
    return;
  }
  box.innerHTML="";
  hot.forEach((p,idx)=>renderBoardItem(box,p,idx+1,`${p.totalStake||0}P`));
}

function renderNearList(){
  const board=document.getElementById("nearBoard");
  const box=document.getElementById("nearList");
  if(!userLocation||!predictions.length){
    board.style.display="none";
    return;
  }

  const near=predictions
    .map(p=>({...p,distance:distanceKm(userLocation.lat,userLocation.lon,p.lat,p.lon)}))
    .filter(p=>p.distance<=8)
    .sort((a,b)=>a.distance-b.distance)
    .slice(0,3);

  if(!near.length){
    board.style.display="none";
    return;
  }

  board.style.display="block";
  box.innerHTML="";
  near.forEach((p,idx)=>renderBoardItem(box,p,idx+1,`${p.distance.toFixed(1)}km`));
}

function renderHistory(){
  const box=document.getElementById("historyList");
  if(!scoreHistory.length){
    box.innerHTML=`<div class="historyItem"><span>아직 참여 기록이 없습니다.</span></div>`;
    return;
  }
  box.innerHTML="";
  scoreHistory.forEach(item=>{
    const settled=item.status==="settled"||item.result;
    let resultText="대기",cls="resultPending";
    if(settled&&item.is_correct===true){resultText="적중";cls="resultWin";}
    else if(settled&&item.is_correct===false){resultText="실패";cls="resultLose";}
    const div=document.createElement("div");
    div.className="historyItem";
    const title=document.createElement("strong");
    title.textContent=item.title;
    const meta=document.createElement("span");
    meta.innerHTML=`선택 ${item.choice==="rain"?"비 온다":"안 온다"} · ${item.stake}P · <b class="${cls}">${resultText}</b>`;
    div.append(title,meta);
    box.appendChild(div);
  });
}

function render(){
  const topList=document.getElementById("topList");
  const otherList=document.getElementById("otherList");

  document.querySelectorAll("[data-comment-input]").forEach(input=>{
    drafts[input.dataset.pid]=input.value;
  });

  const sorted=sortedPredictions();
  const topMarkets=sorted.slice(0,5);
  const otherMarkets=sorted.slice(5);

  topList.innerHTML="";
  otherList.innerHTML="";

  if(!topMarkets.length){
    topList.innerHTML=`<div class="empty">진행 중인 예측이 없습니다.</div>`;
    return;
  }

  topMarkets.forEach(p=>topList.appendChild(createMarketCard(p,false)));
  if(!otherMarkets.length){
    otherList.innerHTML=`<div class="empty">그 외 예측이 없습니다.</div>`;
  }else{
    otherMarkets.forEach(p=>otherList.appendChild(createMarketCard(p,true)));
  }
}

function createMarketCard(p,isSmall){
  const closed=new Date(p.close_time).getTime()<Date.now()||p.status!=="open";
  const isOpen=!!openComments[p.id];
  const comments=p.comments||[];
  const previewComments=isOpen?comments:comments.slice(0,1);

  const card=document.createElement("section");
  card.className=isSmall?"card small":"card";

  const top=document.createElement("div");
  top.className="marketTop";
  const badge=document.createElement("div");
  badge.className="badge";
  badge.textContent=p.region;
  const timer=document.createElement("div");
  timer.className="timer";
  timer.textContent=remaining(p.close_time);
  top.append(badge,timer);

  const title=document.createElement("div");
  title.className="card-title";
  title.textContent=p.title;

  card.append(top,title);

  if(isSmall){
    const row=document.createElement("div");
    row.className="smallRow";
    row.innerHTML=`<div class="smallPercent">비 ${p.rainPercent}% · 안 옴 ${p.clearPercent}%</div>`;
    const btn=document.createElement("button");
    btn.className="smallBtn";
    btn.textContent="열기";
    btn.onclick=()=>{ openComments[p.id]=true; card.replaceWith(createMarketCard(p,false)); };
    row.appendChild(btn);
    card.appendChild(row);
    return card;
  }

  const meta=document.createElement("div");
  meta.className="marketMeta";
  const settle=document.createElement("span");
  settle.textContent=`결과 발표 ${fmtTime(p.target_time)} · ${p.rain_threshold_mm}mm+`;
  const official=document.createElement("span");
  official.className="official";
  official.textContent=`예보 ${p.official_forecast||"UNKNOWN"}`;
  meta.append(settle,official);

  const odds=document.createElement("div");
  odds.className="odds";
  const rain=document.createElement("div");
  rain.className="odd rain";
  rain.innerHTML=`<label>비 온다</label><strong>${p.rainPercent}%</strong><small>${p.rainStake}P</small>`;
  const clear=document.createElement("div");
  clear.className="odd clear";
  clear.innerHTML=`<label>안 온다</label><strong>${p.clearPercent}%</strong><small>${p.clearStake}P</small>`;
  odds.append(rain,clear);

  const bar=document.createElement("div");
  bar.className="bar";
  bar.innerHTML=`<div class="fill" style="width:${Math.max(0,Math.min(100,p.rainPercent))}%"></div>`;

  card.append(meta,odds,bar);

  if(p.myVote){
    const my=document.createElement("div");
    my.className="myPick";
    my.textContent=`내 선택 · ${p.myVote.choice==="rain"?"비 온다":"안 온다"} · ${p.myVote.stake}P`;
    card.appendChild(my);
  }else if(!closed){
    const entry=document.createElement("div");
    entry.className="entry";

    const stakes=document.createElement("div");
    stakes.className="stakes";
[50,100,300,500].forEach(s=>{
      const b=document.createElement("button");
      b.textContent=`${s}P`;
      if(s===selectedStake)b.classList.add("active");
      if(profile.points<s)b.disabled=true;
      b.onclick=()=>{selectedStake=s;render();};
      stakes.appendChild(b);
    });

    const pickBtns=document.createElement("div");
    pickBtns.className="pickBtns";
    const rainBtn=document.createElement("button");
    rainBtn.className="rain";
    rainBtn.textContent="비 온다";
    rainBtn.disabled=profile.points<selectedStake;
    rainBtn.onclick=()=>vote(p.id,"rain");
    const clearBtn=document.createElement("button");
    clearBtn.className="clear";
    clearBtn.textContent="안 온다";
    clearBtn.disabled=profile.points<selectedStake;
    clearBtn.onclick=()=>vote(p.id,"clear");
    pickBtns.append(rainBtn,clearBtn);
    entry.append(stakes,pickBtns);
    card.appendChild(entry);
  }

  const mood=document.createElement("div");
  mood.className="mood";
  const moodTitle=document.createElement("div");
  moodTitle.className="moodTitle";
  moodTitle.innerHTML=`<span>실시간 반응</span><span>${p.totalStake||0}P 참여</span>`;
  const reactions=document.createElement("div");
  reactions.className="reactions";

  [["angry","예보 틀림"],["laugh","웃김"],["agree","인정"]].forEach(([type,label])=>{
    const b=document.createElement("button");
    b.textContent=`${label} ${p.reactionCount?.[type]||0}`;
    b.onclick=()=>react(p.id,type);
    reactions.appendChild(b);
  });

  mood.append(moodTitle,reactions);

  previewComments.forEach(c=>{
    const div=document.createElement("div");
    div.className=isOpen?"comment":"commentPreview";
    const nick=document.createElement("b");
    nick.textContent=c.nickname;
    const body=document.createElement("p");
    body.textContent=c.body;
    div.append(nick,body);
    mood.appendChild(div);
  });

  const toggleBtn=document.createElement("button");
  toggleBtn.className="commentToggle";
  toggleBtn.textContent=isOpen?"반응 접기":`반응 ${comments.length}개 보기`;
  toggleBtn.onclick=()=>{openComments[p.id]=!openComments[p.id];render();};
  mood.appendChild(toggleBtn);

  if(isOpen){
    const form=document.createElement("div");
    form.className="commentForm";
    const input=document.createElement("input");
    input.placeholder="지금 하늘, 체감 근거 남기기";
    input.maxLength=140;
    input.dataset.commentInput="1";
    input.dataset.pid=p.id;
    input.value=drafts[p.id]||"";
    input.onkeydown=e=>{if(e.key==="Enter")submitComment(p.id,input);};
    const submit=document.createElement("button");
    submit.textContent="POST";
    submit.onclick=()=>submitComment(p.id,input);
    form.append(input,submit);
    mood.appendChild(form);
  }

  card.appendChild(mood);
  return card;
}

function openProfile(){
  if(!profile)return;
  updateStatsUI();
  document.getElementById("profileModal").classList.add("show");
}
function closeProfile(){
  document.getElementById("profileModal").classList.remove("show");
}
async function createProfile(){
  const nickname=document.getElementById("nickInput").value.trim()||"Player";
  const json=await post("create_profile",{nickname});
  toast(json.message||"가입 완료");
  load();
}
async function checkin(){
  const btn=document.getElementById("checkinBtn");
  btn.disabled=true;
  const json=await post("checkin");
  toast(json.message||"출석 포인트 확인");
  await load();
  btn.disabled=false;
}
async function vote(predictionId,choice){
  const json = await post("vote",{
    predictionId,
    choice,
    stake:selectedStake
  });

  if(!json.ok){
    toast(json.message || "참여 실패");
    return;
  }

  toast(
    choice === "rain"
      ? `${selectedStake}P · 비 온다 선택`
      : `${selectedStake}P · 안 온다 선택`
  );

  await load();
}
async function submitComment(predictionId,input){
  const text=input.value.trim();
  if(text.length<2){toast("조금 더 입력해주세요.");return;}
  const json=await post("comment",{predictionId,comment:text});
  toast(json.message||"반응 등록 완료");
  input.value="";
  delete drafts[predictionId];
  await load();
}
async function react(predictionId,type){
  const json=await post("react",{predictionId,type});
  toast(json.message||"반응 완료");
  await load();
}
let liveBuzzTimer = null;
let lastBuzzKey = "";

function scheduleLiveBuzz(){
  clearTimeout(liveBuzzTimer);

  if(!predictions.length) return;

  const delay = 14000 + Math.floor(Math.random() * 26000);

  liveBuzzTimer = setTimeout(()=>{
    showLiveBuzz();
    scheduleLiveBuzz();
  }, delay);
}

function showLiveBuzz(){

  const targets = [...predictions]
    .filter(p => p.status === "open")
    .sort((a,b)=>(b.totalStake || 0) - (a.totalStake || 0))
    .slice(0,8);

  if(!targets.length) return;

  const p = targets[Math.floor(Math.random() * targets.length)];

  const side =
    Math.random() > 0.45
      ? "비 온다"
      : "안 온다";

  const amount =
    [300,500,800,1200,2000,3500,5000]
    [Math.floor(Math.random() * 7)];

  const messages = [
    `${p.region} ${side}에 ${amount.toLocaleString()}P 유입`,
    `${p.region} 예측 참여 급증 중`,
    `${p.region} 마감 직전 몰리는 중`,
    `${p.region} 흐름이 크게 흔들리는 중`,
    `${p.region} 현재 가장 뜨거운 예측 중 하나`
  ];

  const msg =
    messages[Math.floor(Math.random() * messages.length)];

  if(msg === lastBuzzKey) return;

  lastBuzzKey = msg;

  liveToast(msg);
}

function liveToast(message){

  const el = document.createElement("div");

  el.className = "liveToast";
  el.textContent = message;

  document.body.appendChild(el);

  requestAnimationFrame(()=>{
    el.classList.add("show");
  });

  setTimeout(()=>{
    el.classList.remove("show");

    setTimeout(()=>{
      el.remove();
    },250);

  },2400);
}
function copyInvite(){
  const code=profile?.referral_code||"";
  navigator.clipboard.writeText(`WETTY BETTY 초대코드: ${code}`);
  toast("초대코드 복사 완료");
}
