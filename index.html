<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0" />
<title>WETTY BETTY</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="./style.css">
</head>

<body>

<div class="app">

  <header class="header">

    <div class="logo-wrap">
      <div class="logo">WETTY <em>BETTY</em></div>
      <div class="sub">WEATHER PICK CLUB</div>
    </div>

    <div class="header-right">

      <button class="icon-btn" onclick="toast('새 알림이 없습니다 🔔')">
        🔔
      </button>

      <button class="profile-mini" onclick="onProfileClick()">
        <span class="pm-icon">👤</span>
        <span class="pm-name" id="nickname">GUEST</span>
      </button>

    </div>

  </header>

  <section class="weather-board">

    <button class="refresh-btn" onclick="refreshWeather()">
      ↻
    </button>

    <div class="weather-top">

      <div>
        <div class="weather-kicker">
          📍 현재 날씨
        </div>

        <div class="temp" id="currentTemp">
          --°
        </div>

        <div class="weather-desc" id="weatherDesc">
          위치 권한을 허용하면 현재 날씨가 표시됩니다.
        </div>
      </div>

      <div class="weather-icon" id="weatherIcon">
        🌤️
      </div>

    </div>

    <div class="weather-grid">

      <div class="weather-cell">
        <span>체감</span>
        <strong id="feelsLike">--°</strong>
      </div>

      <div class="weather-cell">
        <span>강수</span>
        <strong id="rainChance">--%</strong>
      </div>

      <div class="weather-cell">
        <span>바람</span>
        <strong id="windSpeed">--</strong>
      </div>

      <div class="weather-cell">
        <span>변화</span>
        <strong id="tempDiff">--°</strong>
      </div>

    </div>

  </section>

  <div class="actions">

    <button class="main-btn" onclick="checkin()">
      출석 포인트 받기
    </button>

    <button class="sub-btn" onclick="copyInvite()">
      친구 초대 🎁
    </button>

  </div>

  <section class="board">

    <div class="board-head">
      <h2>지금 몰리는 지역</h2>
      <span>LIVE</span>
    </div>

    <div id="hotList"></div>

  </section>

  <section class="section-title">
    <h2>TOP PICKS</h2>
    <span>실시간 예측</span>
  </section>

  <div id="marketList"></div>

</div>

<div class="bottom-nav">

  <button class="nav-btn active">
    <span>🏠</span>
    HOME
  </button>

  <button class="nav-btn">
    <span>⚡</span>
    PICKS
  </button>

  <button class="nav-btn">
    <span>🏆</span>
    RANK
  </button>

  <button class="nav-btn">
    <span>👤</span>
    MY
  </button>

</div>

<div class="overlay" id="profileModal">

  <div class="sheet">

    <div class="sheet-head">

      <div>
        <h2 id="profileName">PROFILE</h2>
        <p id="profileCode">초대코드 --</p>
      </div>

      <button class="close-btn" onclick="closeModal()">
        ×
      </button>

    </div>

    <div class="profile-stats">

      <div class="stat-box">
        <span>포인트</span>
        <strong id="profilePoint">0</strong>
      </div>

      <div class="stat-box">
        <span>적중률</span>
        <strong id="profileRate">0%</strong>
      </div>

      <div class="stat-box">
        <span>연승</span>
        <strong id="profileStreak">0</strong>
      </div>

    </div>

    <button class="main-btn full" onclick="copyInvite()">
      초대코드 복사 🎁
    </button>

    <button class="logout-btn" onclick="logout()">
      로그아웃
    </button>

  </div>

</div>

<div class="toast" id="toast"></div>

<script src="./app.js"></script>

</body>
</html>
