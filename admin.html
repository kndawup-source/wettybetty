<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>WETTY ADMIN</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#050d16;
  --panel:#0b1620;
  --line:rgba(255,255,255,.08);
  --text:#edf4fa;
  --muted:#7f93a2;
  --accent:#dff56a;
  --red:#ff6f6f;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
}

body{
  padding:20px 16px 60px;
  max-width:560px;
  margin:0 auto;
}

button,input,textarea{
  font-family:inherit;
}

.header{
  margin-bottom:20px;
}

.logo{
  font-family:'Syne',sans-serif;
  font-size:34px;
  font-weight:900;
  letter-spacing:-2px;
}

.logo em{
  color:var(--accent);
  font-style:normal;
}

.sub{
  margin-top:6px;
  color:var(--muted);
  font-size:13px;
}

.card{
  margin-top:14px;
  padding:18px;
  border-radius:24px;
  background:linear-gradient(145deg,#102131,#09131d);
  border:1px solid var(--line);
}

.card h2{
  font-size:16px;
  font-weight:900;
}

.desc{
  margin-top:6px;
  color:var(--muted);
  font-size:12px;
  line-height:1.5;
}

.btn{
  width:100%;
  height:50px;
  border:0;
  border-radius:16px;
  margin-top:14px;
  font-size:14px;
  font-weight:900;
  cursor:pointer;
}

.btn-main{
  background:var(--accent);
  color:#07100c;
}

.btn-red{
  background:rgba(255,111,111,.12);
  border:1px solid rgba(255,111,111,.24);
  color:var(--red);
}

.field{
  margin-top:14px;
}

.field label{
  display:block;
  margin-bottom:8px;
  font-size:11px;
  font-weight:900;
  color:var(--muted);
}

.field input,
.field textarea{
  width:100%;
  border:1px solid var(--line);
  background:rgba(255,255,255,.05);
  color:var(--text);
  border-radius:16px;
  padding:14px;
  outline:none;
}

.field textarea{
  min-height:110px;
  resize:none;
}

.market{
  margin-top:12px;
  padding:14px;
  border-radius:18px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--line);
}

.market-title{
  font-size:14px;
  font-weight:900;
  line-height:1.4;
}

.market-meta{
  margin-top:8px;
  color:var(--muted);
  font-size:11px;
}

.toast{
  position:fixed;
  left:50%;
  bottom:30px;
  transform:translateX(-50%);
  padding:12px 18px;
  border-radius:999px;
  background:#edf4fa;
  color:#06100c;
  font-size:13px;
  font-weight:900;
  opacity:0;
  transition:.2s;
  pointer-events:none;
}

.toast.show{
  opacity:1;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">WETTY <em>ADMIN</em></div>
  <div class="sub">실시간 예측 / 공지 / 정산 관리</div>
</div>

<div class="card">
  <h2>예측 생성</h2>
  <div class="desc">
    다음 예측 라운드를 즉시 생성합니다.
  </div>

  <button class="btn btn-main" id="generateBtn">
    예측 생성 실행
  </button>
</div>

<div class="card">
  <h2>결과 정산</h2>
  <div class="desc">
    마감된 예측 결과를 강제 정산합니다.
  </div>

  <button class="btn btn-red" id="settleBtn">
    결과 정산 실행
  </button>
</div>

<div class="card">
  <h2>공지 등록</h2>

  <div class="field">
    <label>공지 제목</label>
    <input id="noticeTitle" placeholder="예: 오늘 밤 강수 확률 급상승">
  </div>

  <div class="field">
    <label>공지 내용</label>
    <textarea id="noticeBody" placeholder="공지 내용을 입력하세요"></textarea>
  </div>

  <button class="btn btn-main" id="noticeBtn">
    공지 등록
  </button>
</div>

<div class="card">
  <h2>현재 열린 예측</h2>
  <div class="desc">
    실시간 업데이트
  </div>

  <div id="marketList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = "https://zuciraifbomusdqcjxyb.supabase.co";

const SUPABASE_ANON_KEY =
"YOUR_SUPABASE_ANON_KEY";

const db = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

const toastEl = document.getElementById("toast");

function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add("show");

  clearTimeout(window.toastTimer);

  window.toastTimer = setTimeout(()=>{
    toastEl.classList.remove("show");
  },1800);
}

async function loadMarkets(){

  const { data } = await db
    .from("wetty_predictions")
    .select("*")
    .eq("status","open")
    .order("total_points",{ ascending:false });

  const box = document.getElementById("marketList");

  if(!data?.length){
    box.innerHTML = `
      <div class="market">
        현재 열린 예측이 없습니다
      </div>
    `;
    return;
  }

  box.innerHTML = data.map(item=>`
    <div class="market">
      <div class="market-title">
        ${item.title}
      </div>

      <div class="market-meta">
        ${item.region_name}
        ·
        ${item.total_points.toLocaleString()}P
      </div>
    </div>
  `).join("");
}

document.getElementById("generateBtn")
.addEventListener("click", async ()=>{

  toast("생성중...");

  const res = await fetch("/api/generate-predictions");

  const json = await res.json();

  if(json.ok){
    toast(`예측 ${json.created}개 생성`);
    loadMarkets();
  }else{
    toast("생성 실패");
  }
});

document.getElementById("settleBtn")
.addEventListener("click", async ()=>{

  toast("정산중...");

  const res = await fetch("/api/settle-predictions");

  const json = await res.json();

  if(json.ok){
    toast(`${json.settled}개 정산 완료`);
    loadMarkets();
  }else{
    toast("정산 실패");
  }
});

document.getElementById("noticeBtn")
.addEventListener("click", async ()=>{

  const title =
    document.getElementById("noticeTitle").value.trim();

  const body =
    document.getElementById("noticeBody").value.trim();

  if(!title || !body){
    return toast("공지 내용을 입력해주세요");
  }

  const { error } = await db
    .from("wetty_notices")
    .insert({
      title,
      body,
      is_active:true
    });

  if(error){
    toast("공지 등록 실패");
    return;
  }

  document.getElementById("noticeTitle").value = "";
  document.getElementById("noticeBody").value = "";

  toast("공지 등록 완료");
});

db.channel("admin-live")
.on(
  "postgres_changes",
  {
    event:"*",
    schema:"public",
    table:"wetty_predictions"
  },
  ()=>loadMarkets()
)
.subscribe();

loadMarkets();
</script>

</body>
</html>
