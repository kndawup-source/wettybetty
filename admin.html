<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WETTY BETTY ADMIN</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050d16;color:#edf4fa;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif}
.app{max-width:520px;margin:0 auto;min-height:100dvh;padding:18px 16px 60px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
h1{font-size:22px;letter-spacing:-.8px}
.badge{color:#dff56a;font-size:12px;font-weight:900}
.card{border:1px solid rgba(255,255,255,.08);background:#0b1620;border-radius:22px;padding:16px;margin:12px 0}
label{display:block;margin-top:10px;color:#8193a0;font-size:12px;font-weight:900}
input,select{width:100%;height:44px;margin-top:6px;border:1px solid rgba(255,255,255,.08);background:#07111b;color:#edf4fa;border-radius:14px;padding:0 12px}
button{height:42px;border:0;border-radius:14px;background:#dff56a;color:#07100d;font-weight:900;padding:0 14px;margin-top:10px}
button.dark{background:rgba(255,255,255,.07);color:#edf4fa;border:1px solid rgba(255,255,255,.08)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.item{border-top:1px solid rgba(255,255,255,.08);padding:12px 0}
.item:first-child{border-top:0}
.item h3{font-size:15px}
.item p{margin-top:5px;color:#8193a0;font-size:12px;line-height:1.4}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#edf4fa;color:#050d16;border-radius:999px;padding:12px 16px;font-size:13px;font-weight:900;display:none}
.toast.show{display:block}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>WETTY ADMIN</h1>
    <span class="badge">MARKET CONTROL</span>
  </div>

  <section class="card">
    <h2>관리자 PIN</h2>
    <input id="pin" placeholder="ADMIN_PIN 입력" />
    <button onclick="savePin()">저장</button>
  </section>

  <section class="card">
    <h2>마켓 생성</h2>
    <label>제목</label>
    <input id="title" placeholder="오늘 18시 강남역, 비 올까?" />

    <label>지역</label>
    <input id="region" placeholder="서울 · 강남역" />

    <label>공식 예보</label>
    <input id="official" placeholder="CLEAR 54%" />

    <div class="row">
      <div>
        <label>결과 기준 시간</label>
        <input id="target" type="datetime-local" />
      </div>
      <div>
        <label>마감 시간</label>
        <input id="close" type="datetime-local" />
      </div>
    </div>

    <label>비 판정 기준 mm</label>
    <input id="threshold" type="number" step="0.1" value="0.1" />

    <button onclick="createMarket()">마켓 생성</button>
  </section>

  <section class="card">
    <h2>마켓 목록</h2>
    <button class="dark" onclick="loadMarkets()">새로고침</button>
    <div id="list"></div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "/api/admin";

function getPin(){
  return localStorage.getItem("wetty_admin_pin") || "";
}

function savePin(){
  localStorage.setItem("wetty_admin_pin", document.getElementById("pin").value.trim());
  toast("PIN 저장 완료");
  loadMarkets();
}

function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),1800);
}

async function api(method="GET", body=null){
  const opt = {
    method,
    headers:{ "x-admin-pin": getPin(), "Content-Type":"application/json" }
  };
  if(body) opt.body = JSON.stringify(body);
  const res = await fetch(API,opt);
  return res.json();
}

function toISO(v){
  if(!v) return "";
  return new Date(v).toISOString();
}

async function createMarket(){
  const json = await api("POST",{
    action:"create_market",
    title:document.getElementById("title").value,
    region:document.getElementById("region").value,
    official_forecast:document.getElementById("official").value,
    target_time:toISO(document.getElementById("target").value),
    close_time:toISO(document.getElementById("close").value),
    rain_threshold_mm:document.getElementById("threshold").value
  });
  toast(json.message || "완료");
  loadMarkets();
}

async function closeMarket(id){
  const json = await api("POST",{ action:"close_market", id });
  toast(json.message || "마감 완료");
  loadMarkets();
}

async function settleMarket(id,result){
  if(!confirm(result === "rain" ? "RAIN으로 정산할까요?" : "CLEAR로 정산할까요?")) return;
  const json = await api("POST",{ action:"settle_market", id, result });
  toast(json.message || "정산 완료");
  loadMarkets();
}

async function loadMarkets(){
  const json = await api("GET");
  const list = document.getElementById("list");

  if(!json.ok){
    list.innerHTML = `<p style="color:#ff6f6f;margin-top:12px">${json.message || "불러오기 실패"}</p>`;
    return;
  }

  list.innerHTML = "";

  (json.predictions || []).forEach(p=>{
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <h3>${p.title}</h3>
      <p>${p.region} · ${p.status} · 결과 ${p.result || "-"}</p>
      <p>마감 ${new Date(p.close_time).toLocaleString("ko-KR")}</p>
    `;

    const actions = document.createElement("div");
    actions.className = "actions";

    const close = document.createElement("button");
    close.className = "dark";
    close.textContent = "마감";
    close.onclick = ()=>closeMarket(p.id);

    const rain = document.createElement("button");
    rain.textContent = "RAIN 정산";
    rain.onclick = ()=>settleMarket(p.id,"rain");

    const clear = document.createElement("button");
    clear.textContent = "CLEAR 정산";
    clear.onclick = ()=>settleMarket(p.id,"clear");

    actions.append(close,rain,clear);
    div.appendChild(actions);
    list.appendChild(div);
  });
}

document.getElementById("pin").value = getPin();
loadMarkets();
</script>
</body>
</html>
